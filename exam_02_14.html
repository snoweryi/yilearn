<style>
  :root{
    --bg:#f4f6f3; --paper:#ffffff; --ink:#1f2b22; --ink-soft:#5b6b5f; --line:#dfe6dd;
    --pine:#2f5d3a; --pine-deep:#1e4028; --moss:#7aa06b; --clay:#8a5a9e;

  html,body{margin:0;padding:0;}
  body{

  }
  header.hero::after{
    content:""; position:absolute; inset:0;
    background: radial-gradient(500px 260px at 85% 20%, rgba(138,90,158,0.35), transparent 70%);
    pointer-events:none;
  }
  .hero-inner{max-width:1900px;margin:0 auto;position:relative;z-index:1;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px; font-size: 22px; letter-spacing:.14em; text-transform:uppercase;

  }
  h1{font-size:clamp(24px,4vw,34px); margin:0 0 10px; font-weight:800;}
  .hero p.sub{color:#e4efdd; font-size: 22px; max-width:1900px; margin:0 0 22px;}
  .hero-stats{display:flex; gap:14px; flex-wrap:wrap;}
  .stat{background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:10px 16px; min-width:110px;}
  .stat b{display:block; font-size:20px;}
  .stat span{font-size: 22px; color:#dcecd3;}

  .toolbar{
    position:sticky; top:0; z-index:20; background:rgba(244,246,243,0.92); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line); padding:14px 20px;
  }
  .toolbar-inner{max-width:1900px;margin:0 auto; display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .toolbar-label{font-size: 22px; color:var(--ink-soft); margin-right:2px;}
  .chip{border:1px solid var(--line); background:var(--paper); color:var(--ink-soft); padding:7px 14px; border-radius:999px; font-size: 22px; cursor:pointer; transition:.15s ease;}
  .chip:hover{border-color:var(--moss); color:var(--pine-deep);}
  .chip.active{background:var(--pine); border-color:var(--pine); color:#fff;}
  .search{margin-left:auto; flex:1 1 180px; max-width:240px; border:1px solid var(--line); border-radius:999px; padding:7px 14px; font-size: 22px; background:var(--paper); color:var(--ink);}
  .search:focus{outline:2px solid var(--moss); outline-offset:1px;}

  .section-nav{max-width:1900px;margin:22px auto 0; padding:0 20px; display:flex; gap:8px; flex-wrap:wrap; font-size: 22px;}
  .section-nav a{color:var(--ink-soft); text-decoration:none; border:1px solid var(--line); padding:4px 10px; border-radius:8px; background:var(--paper);}
  .section-nav a:hover{color:var(--pine-deep); border-color:var(--moss);}

  main{max-width:1900px; margin:26px auto 0; padding:0 20px;}
  .unit-block{margin-top:36px;}
  .unit-title{display:flex; align-items:baseline; gap:10px; margin-bottom:14px; border-bottom:2px solid var(--pine); padding-bottom:8px;}
  .unit-code{font-family:"SFMono-Regular",Consolas,monospace; font-size: 22px; color:#fff; background:var(--clay); padding:3px 9px; border-radius:6px;}
  .unit-title h2{font-size: 22px; margin:0; color:var(--pine-deep); font-weight:700;}

  .qcard{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:18px 20px 16px; margin-bottom:14px; box-shadow:var(--shadow); scroll-margin-top:80px;}
  .qcard.hidden{display:none;}
  .qhead{display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .qnum{font-weight:800; color:var(--pine-deep); font-size: 22px; min-width:34px;}
  .tag{font-size: 22px; padding:2px 9px; border-radius:999px; font-weight:600;}
  .tag.l{background:var(--tag-l); color:var(--tag-l-ink);}
  .tag.a{background:var(--tag-a); color:var(--tag-a-ink);}
  .qtext{font-size: 22px; font-weight:600; margin:6px 0 12px; color:var(--ink);}
  .options{list-style:none; margin:0 0 10px; padding:0; display:grid; gap:7px;}
  .options li{font-size: 22px; color:var(--ink-soft); padding:8px 12px 8px 36px; position:relative; border:1px solid var(--line); border-radius:9px; background:#fbfcfa;}
  .options li .opt-key{position:absolute; left:10px; top:8px; font-weight:700; color:var(--moss);}
  details{margin-top:8px;}
  summary{cursor:pointer; font-size: 22px; color:var(--pine); font-weight:700; list-style:none; display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--pine); border-radius:999px; width:fit-content; transition:.15s;}
  summary::-webkit-details-marker{display:none;}
  summary:hover{background:var(--pine); color:#fff;}
  details[open] summary{background:var(--pine); color:#fff;}
  .answer-box{margin-top:12px; padding:12px 14px; background:#f3f8f0; border-left:4px solid var(--pine); border-radius:0 10px 10px 0;}
  .answer-box .ans-line{font-size: 22px; font-weight:700; color:var(--pine-deep); margin-bottom:4px;}
  .answer-box .exp{font-size:22px; color:var(--ink);}

  .empty-state{text-align:center; color:var(--ink-soft); padding:50px 20px; display:none;}
  .empty-state.show{display:block;}
  footer{max-width:1900px; margin:50px auto 0; padding:20px; text-align:center; color:var(--ink-soft); font-size: 22px; border-top:1px solid var(--line);}

<script>
const UNITS = {
  "L12101": "組織型溫室氣體盤查範圍與規範說明",
  "L12102": "組織型溫室氣體盤查邊界界定",
  "L12103": "溫室氣體排放量量化計算",
  "L12104": "溫室氣體排放清冊與報告書建立",
  "L12201": "碳足跡管理與計算基礎原則",
  "L12202": "生命週期評估（LCA）概念",
  "L12203": "產品類別規則（PCR）訂定概念",
  "L12204": "產品製程地圖製作與系統邊界",
  "L12205": "活動數據收集、排放係數取得、產品碳排放量計算與結果闡釋"
};

const QUESTIONS = [
{id:1,unit:"L12101",type:"理解",q:"溫室氣體「報告期間」之定義通常為何？",opts:[
 "通常為連續十二個月之期間，因為此期間長度便於逐年比較排放趨勢變化",
 "通常為連續一個月之期間，因為此期間長度便於掌握短期排放波動情形",
 "通常為連續三年之期間，因為此期間長度便於觀察中長期減量成效",
 "通常無固定期間長度，因為報告期間長短由查證機構自行決定即可"
],ans:0,exp:"溫室氣體報告期間通常設定為連續十二個月（一個會計或營運年度），以利與基準年及後續年度進行一致性比較。"},

{id:2,unit:"L12101",type:"理解",q:"直接排放與間接排放之區分依據為何？",opts:[
 "依排放是否發生於報告組織自有或控制之排放源，因為此區分方式決定歸屬之範疇類別",
 "依排放氣體種類是否屬於六種法定溫室氣體，因為不同氣體種類決定排放歸屬類別",
 "依排放發生地點是否位於國內或國外，因為地理位置決定排放歸屬之範疇類別",
 "依排放量數值大小是否超過特定門檻，因為數值高低決定排放歸屬之範疇類別"
],ans:0,exp:"直接排放（範疇一）發生於組織自有或控制之排放源，間接排放（範疇二、三）則發生於組織邊界外但與其活動相關，區分依據為控制關係而非氣體種類或地點。"},

{id:3,unit:"L12101",type:"理解",q:"查證等級中「合理保證」與「有限保證」之主要差異為何？",opts:[
 "合理保證所需查證證據與程序較嚴謹，因為此等級提供較高之確信程度予使用者",
 "有限保證所需查證證據與程序較嚴謹，因為此等級提供較高之確信程度予使用者",
 "兩種保證等級之查證程序與嚴謹程度完全相同，因為兩者僅在報告書用詞略有不同",
 "保證等級高低完全取決於企業規模大小，因為規模越大之企業保證等級必然越高"
],ans:0,exp:"合理保證需執行較廣泛之查證程序、蒐集較多證據，以提供較高之確信程度；有限保證程序相對精簡，確信程度較低。"},

{id:4,unit:"L12101",type:"應用",q:"某公司首次盤查時發現部分歷史用電資料缺漏，應如何處理以符合準則精神？",opts:[
 "以合理保守之估算方法補足缺漏並揭露假設依據，因為透明揭露有助維持報告可信度",
 "直接以零計算缺漏期間之用電排放量，因為缺乏資料代表該期間排放可視為不存在",
 "略過缺漏期間直接以次年度資料取代，因為以較新資料替代更能反映當前排放水準",
 "因資料缺漏而放棄該年度整體盤查作業，因為部分缺漏已使整體盤查失去參考意義"
],ans:0,exp:"面對歷史資料缺漏，應採用合理保守之估算方法（如同期其他月份平均值）補足，並於報告中揭露假設與限制，以維持透明性與可信度。"},

{id:5,unit:"L12101",type:"應用",q:"富林農場首次辦理盤查，發現占比極低之堆肥翻堆機具油耗資料不易取得，依重大性原則應如何處理？",opts:[
 "評估其占比是否低於重大性門檻並於揭露假設後以合理估算處理，因為此舉兼顧效率與透明性",
 "無論占比高低皆須逐筆精確量測，因為所有排放源均須以完全相同精確度處理",
 "因資料取得不易而直接排除不予揭露，因為次要排放源本就不需要在報告中提及",
 "因單一設備資料缺漏而暫停整體農場盤查計畫，因為缺漏資料已使全案失去意義"
],ans:0,exp:"依重大性原則，占比極低之次要排放源可在合理估算並揭露假設之前提下簡化處理，兼顧盤查效率與報告透明性，惟仍須留下處理紀錄以利後續查證。"},

{id:6,unit:"L12102",type:"理解",q:"「財務控制法」界定組織邊界之核心判斷依據為何？",opts:[
 "是否具備主導該公司財務與營運政策以獲取經濟利益之能力，因為此能力代表實質控制程度",
 "是否為該公司股權登記名冊上之最大股東，因為股東身分即代表具備實質控制能力",
 "是否派任該公司之會計人員與出納人員，因為人事派任即代表具備實質控制能力",
 "是否與該公司簽署年度採購合作契約，因為契約關係即代表具備實質控制能力"
],ans:0,exp:"財務控制法以是否具備主導財務與營運政策並藉此獲取經濟利益之能力作為判斷依據，而非單純股權登記、人事派任或採購契約關係。"},

{id:7,unit:"L12102",type:"理解",q:"企業自願納入範疇三排放類別之主要考量為何？",opts:[
 "供應鏈上下游排放占比高且具改善潛力，因為納入後有助掌握整體價值鏈減碳機會",
 "範疇三計算方式較範疇一二簡單，因為簡單之計算方式較能節省盤查作業時間",
 "主管機關已強制要求全數企業納入，因為法規要求本身即為唯一考量因素",
 "範疇三排放係數取得成本較低廉，因為成本考量為範疇三是否納入之首要依據"
],ans:0,exp:"範疇三雖屬自願性揭露，企業通常依據供應鏈排放占比高低與改善潛力，決定優先納入之類別，以掌握整體價值鏈之減碳機會。"},

{id:8,unit:"L12102",type:"理解",q:"企業發生併購導致組織邊界改變時，對盤查作業之影響為何？",opts:[
 "應評估是否需追溯調整基準年數據以維持比較基礎一致，因為結構性改變影響逐年比較有效性",
 "完全不影響既有基準年與歷年盤查數據，因為組織架構變動與排放量化本質上並無關聯",
 "應立即終止該企業所有既往之盤查紀錄，因為併購已使先前資料失去任何參考價值",
 "應由新併入公司自行決定是否揭露排放，因為併購後之揭露義務應由被併購方承擔"
],ans:0,exp:"併購等重大組織結構改變，應依重大性原則評估是否需追溯調整基準年數據，以確保逐年比較之一致性與有效性。"},

{id:9,unit:"L12102",type:"應用",q:"企業承租辦公室但未持有該建築物之產權，依控制法界定邊界時，該辦公室用電應如何處理？",opts:[
 "依是否具備營運控制權決定是否納入承租辦公室排放，因為控制法以決策主導權而非產權為依據",
 "一律不納入承租辦公室之任何排放，因為未持有產權即代表完全不具排放責任",
 "一律全數納入承租辦公室之全部排放，因為只要有使用行為即應承擔全部排放責任",
 "依租金金額高低比例分攤該辦公室排放，因為租金數額能直接反映排放責任大小"
],ans:0,exp:"控制法之判斷重點在於是否具備營運決策主導權，而非產權歸屬，故承租辦公室之排放應視企業對該場所之營運控制程度決定是否納入。"},

{id:10,unit:"L12102",type:"應用",q:"富林農場委外經營之部分導覽解說服務由第三方公司派員駐場執行，其相關排放應如何界定？",opts:[
 "依農場對該服務之營運決策主導程度評估是否納入邊界，因為控制程度為判斷納入與否之依據",
 "一律全數視為農場自身排放並直接納入計算，因為服務發生於農場場域內即應全數歸屬農場",
 "一律排除於農場邊界之外不予考慮，因為委外服務之排放應完全由第三方公司自行負責",
 "依雙方契約金額比例分攤相關排放，因為契約金額高低能直接反映排放責任歸屬比例"
],ans:0,exp:"委外服務之排放歸屬，應依農場對該項活動之營運決策主導程度（控制力）判斷是否納入邊界，而非單純以場域或契約金額為依據。"},

{id:11,unit:"L12102",type:"應用",q:"某公司於邊界內處分一座舊廠房，隔年應如何處理基準年排放量？",opts:[
 "依重大性原則評估是否需追溯調整基準年排放量，因為處分設施屬結構性改變之一種",
 "完全不需調整基準年排放數據，因為處分行為對排放盤查完全不具任何影響",
 "直接以處分前最後一年數據取代基準年，因為最新資料較能反映企業目前排放水準",
 "因設施處分而停止該公司後續所有盤查作業，因為既有比較基礎已完全喪失意義"
],ans:0,exp:"處分設施與新增設施相同，均屬組織結構性改變，應依重大性原則評估是否需追溯調整基準年排放量，以維持逐年比較之一致性。"},

{id:12,unit:"L12103",type:"理解",q:"IPCC 評估報告中 GWP 值所採用之時間基準通常為何？",opts:[
 "以一百年為時間基準進行計算，因為此基準廣泛用於國際間之標準化比較",
 "以十年為時間基準進行計算，因為此基準較能反映氣體短期暖化效應",
 "以一千年為時間基準進行計算，因為此基準較能反映氣體長期累積效應",
 "時間基準完全不影響GWP數值高低，因為GWP本質上與時間長短無關"
],ans:0,exp:"IPCC 常用之 GWP 值多以百年（GWP100）為時間基準進行標準化計算，以利國際間比較；不同時間基準（如二十年）會得出不同數值。"},

{id:13,unit:"L12103",type:"理解",q:"「生質（biogenic）二氧化碳排放」於盤查中之處理原則為何？",opts:[
 "通常需單獨列示揭露而不計入化石燃料排放總量，因為兩者碳循環性質有所不同",
 "一律完全排除不予任何形式之記錄揭露，因為生質排放本質上不具任何暖化效應",
 "應與化石燃料排放直接加總後單一呈現，因為兩者對暖化之貢獻程度完全相同",
 "僅於企業自願揭露時才需要處理，因為此類排放並非任何準則所關注之項目"
],ans:0,exp:"生質二氧化碳排放（如生質燃料燃燒）通常單獨列示揭露，因其屬於短期碳循環之一部分，與化石燃料釋放之地質碳有所區隔，惟仍應完整記錄以利透明溝通。"},

{id:14,unit:"L12103",type:"理解",q:"活動數據品質分級中，「量測數據」相較「推估數據」之特性為何？",opts:[
 "量測數據通常具較高準確度與可追溯性，因為其直接來自實際監測或計量設備",
 "推估數據通常具較高準確度與可追溯性，因為其係依經驗法則綜合判斷而得",
 "兩種數據品質完全相同並無優劣之分，因為準則並未針對數據來源進行分級",
 "量測數據僅適用於範疇一計算，因為範疇二三計算完全不需採用量測數據"
],ans:0,exp:"活動數據品質通常依取得方式分級，量測數據（如電錶讀數）因直接來自監測或計量設備，通常具較高準確度與可追溯性，優於憑經驗推估之數據。"},

{id:15,unit:"L12103",type:"應用",q:"進行不確定性評估時，企業應優先檢視之項目為何？",opts:[
 "活動數據取得方式與排放係數來源之可靠程度，因為此二者為影響量化結果準確性之主要因素",
 "企業員工對盤查制度之熟悉程度，因為員工認知程度與最終數值準確性並無直接關聯",
 "企業歷年財務報表之編製品質，因為財務數據品質與排放量化準確性完全無關",
 "企業辦公室裝潢與設備新舊程度，因為辦公環境條件與排放量化準確性並無關聯"
],ans:0,exp:"不確定性評估應聚焦於影響量化結果準確性之主要因素，即活動數據之取得方式（量測、計算或推估）與所採用排放係數之可靠程度。"},

{id:16,unit:"L12103",type:"應用",q:"公司車隊使用汽油之移動源排放，計算範疇一排放所需之活動數據為何？",opts:[
 "汽油實際加油公升數及對應之汽油排放係數，因為移動源排放需以實際燃料使用量換算",
 "公司車輛之購買總價與車齡分布，因為車輛價值高低能間接反映其排放量多寡",
 "駕駛員之駕駛年資與違規紀錄，因為駕駛經驗豐富程度能反映油耗效率高低",
 "車隊每月保養維修之總支出金額，因為維修支出多寡能反映車輛排放量高低"
],ans:0,exp:"移動燃燒源（如公司車隊）之排放計算，應以實際燃料使用量（如汽油公升數）乘以對應排放係數，而非車輛價格、駕駛紀錄或維修支出。"},

{id:17,unit:"L12103",type:"應用",q:"農場冷藏設備逸散之冷媒氣體排放量計算，主要依據之活動數據為何？",opts:[
 "冷媒實際補充或洩漏之重量數據，因為逸散排放需以實際冷媒補充量換算對應係數",
 "冷藏設備之購買價格與品牌型號，因為設備價格高低能間接反映冷媒逸散程度",
 "冷藏設備每日開關次數與使用時段，因為開關頻率能直接反映冷媒逸散總量",
 "冷藏設備存放農產品之總重量，因為存放重量多寡能反映冷媒逸散排放程度"
],ans:0,exp:"逸散性排放（如冷媒洩漏）之量化，應以實際補充或洩漏之冷媒重量作為活動數據，乘以該冷媒對應之 GWP 值換算為 CO2 當量。"},

{id:18,unit:"L12103",type:"應用",q:"若企業無法取得特定排放源之官方排放係數單位，應如何處理？",opts:[
 "尋找性質相近且單位可轉換之替代係數並註明轉換方式，因為合理轉換仍可維持量化之可追溯性",
 "直接以該排放源之活動數據原始單位作為最終排放量，因為單位是否一致對結果並無影響",
 "因單位不符而逕自排除該排放源不予計算，因為缺乏對應單位代表無法進行任何估算",
 "隨意指定一組轉換比例而不留下任何計算依據，因為報告書並不需要揭露轉換過程細節"
],ans:0,exp:"缺乏對應單位之官方係數時，應尋找性質相近且可合理轉換單位之替代係數，並於報告中清楚註明轉換方式與依據，以維持量化結果之可追溯性與透明性。"},

{id:19,unit:"L12104",type:"理解",q:"溫室氣體報告書中應揭露之「方法學限制」內容通常包含？",opts:[
 "數據品質侷限、估算假設及未涵蓋之排放源，因為揭露限制有助使用者正確解讀報告",
 "企業未來三年之財務預測數字，因為財務預測與溫室氣體方法學限制並無關聯",
 "企業高階主管之個人學經歷背景，因為主管背景與方法學限制之揭露並無關聯",
 "企業產品之詳細定價策略內容，因為定價策略與方法學限制之揭露並無關聯"
],ans:0,exp:"報告書之方法學限制段落，應揭露數據品質侷限、關鍵假設及未涵蓋之排放源等資訊，協助使用者正確理解與解讀量化結果之適用範圍。"},

{id:20,unit:"L12104",type:"理解",q:"「重新計算政策（recalculation policy）」之主要用途為何？",opts:[
 "明訂於何種情況下需追溯調整基準年或歷史排放數據，因為明確政策有助維持逐年比較一致性",
 "明訂企業年度員工績效考核之計算公式，因為績效考核與排放數據重新計算並無關聯",
 "明訂企業產品未來三年之定價調整幅度，因為定價調整與排放數據重新計算並無關聯",
 "明訂企業辦公設備汰舊換新之採購週期，因為設備採購週期與排放數據重新計算並無關聯"
],ans:0,exp:"重新計算政策明訂於組織結構改變、方法學調整或發現重大錯誤等情況下，如何追溯調整基準年或歷史數據，以維持逐年比較之一致性與透明性。"},

{id:21,unit:"L12104",type:"應用",q:"企業內部建立排放數據管理系統之主要效益為何？",opts:[
 "提升數據蒐集效率並降低人工彙整錯誤風險，因為系統化流程有助確保後續查證品質",
 "直接降低企業實際排放量之絕對數值，因為系統本身即具備減碳之實質功能",
 "完全取代第三方查證機構之查證程序，因為系統產出之數據無需再經外部確認",
 "自動提升企業產品於市場上之銷售業績，因為系統化管理與產品銷售並無直接關聯"
],ans:0,exp:"建立數據管理系統有助提升蒐集效率、降低人工彙整錯誤風險並強化資料可追溯性，但系統本身並不會直接降低實際排放量，亦無法取代第三方查證程序。"},

{id:22,unit:"L12104",type:"應用",q:"某公司欲提升報告書之公信力，除委託查證外，另一項有效作法為何？",opts:[
 "於報告書中完整揭露量化方法、假設與限制，因為完整揭露有助使用者評估結果適用性",
 "於報告書中僅呈現對企業最有利之片段數據，因為選擇性揭露較能維持良好企業形象",
 "於報告書中避免提及任何數據來源與計算方式，因為簡化內容較能提升閱讀便利性",
 "於報告書中大量使用專業術語且不加以說明，因為專業術語較能展現企業技術實力"
],ans:0,exp:"除第三方查證外，完整揭露量化方法、假設與限制，有助使用者正確評估報告結果之適用範圍與侷限性，進一步強化報告書之公信力與透明度。"},

{id:23,unit:"L12104",type:"應用",q:"富林農場逐年盤查後，欲對外呈現減碳成效，報告書應避免之做法為何？",opts:[
 "僅挑選排放下降之單一年度數據對外呈現，因為片面呈現可能誤導使用者對整體趨勢之判斷",
 "完整呈現逐年排放趨勢並說明增減原因，因為完整脈絡有助使用者正確理解實際成效",
 "於報告書中揭露資料蒐集方法與計算依據，因為方法揭露有助提升報告整體可信度",
 "於報告書中一併說明未來減碳目標與具體措施，因為目標揭露有助展現企業永續決心"
],ans:0,exp:"對外呈現減碳成效時應避免片面挑選有利年度數據，而應完整呈現逐年趨勢並說明增減原因，以維持報告之透明性與可信度，避免誤導使用者判斷。"},

{id:24,unit:"L12201",type:"理解",q:"產品碳足跡計算中「功能單位」之定義為何？",opts:[
 "量化產品功能表現之參考基準單位，因為統一基準有助不同產品間之公平比較",
 "產品於市場上之零售建議售價，因為售價高低能反映產品之整體功能表現",
 "產品製造過程中所使用之能源種類，因為能源種類決定產品之最終功能表現",
 "產品包裝上所標示之保存期限，因為保存期限長短能反映產品之功能表現"
],ans:0,exp:"功能單位為量化產品功能表現之參考基準（如每公斤稻米、每份餐食），作為計算與比較碳足跡之共同基礎，而非售價、能源種類或保存期限。"},

{id:25,unit:"L12201",type:"理解",q:"ISO 14067 對「比較性主張」之揭露有何限制？",opts:[
 "對外進行產品間比較主張時應符合特定嚴謹要求，因為避免誤導消費者為主要考量",
 "完全禁止企業對外提出任何形式之比較性主張，因為比較主張本質上具高度誤導性",
 "比較性主張僅需企業內部自行核可即可對外發布，因為內部核可已足夠確保正確性",
 "比較性主張之揭露要求與一般宣稱完全相同，因為兩者於準則中並未特別區分"
],ans:0,exp:"ISO 14067 對比較性主張設有較嚴謹之要求（如採用相同系統邊界、功能單位與數據品質），以避免誤導消費者，並非完全禁止比較，亦非等同一般宣稱之揭露標準。"},

{id:26,unit:"L12201",type:"理解",q:"產品碳足跡中「生質碳」之處理原則為何？",opts:[
 "通常單獨列示並可能扣除吸收量以避免重複計算，因為生質碳循環性質與化石碳有別",
 "一律與化石碳排放合併計算不予區分，因為兩者對暖化效應之貢獻完全相同",
 "完全排除於產品碳足跡計算範圍之外，因為生質碳本質上不具任何暖化效應",
 "僅適用於農產品類別之碳足跡計算，因為其他產品類別完全不涉及生質碳議題"
],ans:0,exp:"生質碳因涉及短期碳循環，通常於產品碳足跡中單獨列示，並可能扣除相對應之生物吸收量以避免重複計算，處理原則與化石碳排放有所區隔。"},

{id:27,unit:"L12201",type:"應用",q:"某公司生產之聯產品欲分攤碳足跡，可採用之常見分攤方式為何？",opts:[
 "依質量或經濟價值等合理基礎進行分攤，因為分攤基礎需具備可解釋性與一致性",
 "一律平均分攤予各聯產品不論產量差異，因為平均分攤方式最為簡便省時",
 "完全歸屬於銷售量最大之單一聯產品，因為銷售量高低即代表排放責任大小",
 "依聯產品外觀色澤與包裝精美程度分攤，因為外觀因素與排放分攤並無合理關聯"
],ans:0,exp:"聯產品碳足跡之分攤應採用質量、經濟價值或其他具可解釋性之合理基礎，而非單純平均分攤、歸屬單一產品或依外觀等無關因素分攤。"},

{id:28,unit:"L12201",type:"應用",q:"富林農場欲以碳標籤形式對外溝通有機蔬菜之碳足跡結果，較適當之作法為何？",opts:[
 "依循ISO14067規範完整揭露計算範圍方法與數值，因為完整資訊揭露有助建立消費者信任",
 "僅標示一個簡化數字而不揭露任何計算依據，因為簡化呈現較能吸引消費者注意目光",
 "依行銷需求任意調整最終呈現之碳足跡數值，因為數值美化有助提升產品市場競爭力",
 "僅於企業內部文件記錄不對外進行任何揭露，因為對外揭露並非碳標籤之核心目的"
],ans:0,exp:"以碳標籤對外溝通產品碳足跡時，應依循 ISO 14067 規範完整揭露計算範圍、方法學與數值依據，以建立消費者信任並避免誤導性宣稱。"},

{id:29,unit:"L12202",type:"理解",q:"LCA 中「系統邊界」與「功能單位」之關係為何？",opts:[
 "系統邊界界定範圍須對應功能單位所代表之產品功能，因為兩者須具一致性以確保結果有效",
 "系統邊界與功能單位為完全獨立概念互不影響，因為兩者分屬不同階段之評估工作內容",
 "功能單位須依系統邊界界定範圍事後調整訂定，因為邊界界定應優先於功能單位之訂定",
 "系統邊界僅適用於組織型盤查而非產品評估，因為系統邊界概念不存在於產品層級評估"
],ans:0,exp:"系統邊界之界定範圍須對應功能單位所代表之產品功能與生命週期階段，兩者須具一致性，以確保後續清冊分析與衝擊評估結果具有效性。"},

{id:30,unit:"L12202",type:"理解",q:"LCA 中常見之質量分攤與經濟價值分攤，其選用考量為何？",opts:[
 "依產品特性與資料可取得性選擇合適之分攤基礎，因為不同情境適用之分攤方法有所差異",
 "一律優先採用經濟價值分攤且不考慮其他方法，因為經濟價值分攤為國際唯一認可方式",
 "一律優先採用質量分攤且不考慮其他方法，因為質量分攤為國際唯一認可方式",
 "分攤方法選用完全不影響最終評估結果，因為不同分攤基礎所得結果應完全一致"
],ans:0,exp:"分攤方法（如質量分攤、經濟價值分攤）之選用，應依產品特性、資料可取得性與情境合理性綜合考量，並無單一唯一認可之方式，選用結果亦可能影響最終評估數值。"},

{id:31,unit:"L12202",type:"應用",q:"執行 LCA 時進行敏感度分析之主要目的為何？",opts:[
 "評估關鍵假設或參數變動對最終結果之影響程度，因為此舉有助了解結果之穩健程度",
 "評估企業產品於市場上之定價彈性程度，因為定價彈性與生命週期評估結果並無關聯",
 "評估企業員工對評估作業之熟悉程度，因為員工熟悉度與敏感度分析目的並無關聯",
 "評估企業競爭對手之市場占有率變化，因為市場占有率與生命週期評估結果並無關聯"
],ans:0,exp:"敏感度分析用以評估關鍵假設、參數或數據來源變動對最終評估結果之影響程度，有助了解結果之穩健性與可信賴範圍。"},

{id:32,unit:"L12202",type:"理解",q:"「特徵化因子」於 LCIA 階段之作用為何？",opts:[
 "將不同物質之清冊數據轉換為共同衝擊類別之量化貢獻，因為需統一基準以利加總比較",
 "決定產品最終於市場上之零售訂價策略，因為特徵化因子與產品訂價策略直接相關",
 "決定企業內部員工之考核績效指標，因為特徵化因子與人力資源考核直接相關",
 "決定企業年度行銷預算之編列比例，因為特徵化因子與行銷預算編列直接相關"
],ans:0,exp:"特徵化因子（如 GWP）用以將 LCI 階段所蒐集之不同物質數據，轉換為共同衝擊類別（如全球暖化）之量化貢獻，以利加總與比較。"},

{id:33,unit:"L12202",type:"應用",q:"委託外部專家對 LCA 研究進行「關鍵性審查」之主要目的為何？",opts:[
 "確認研究方法學是否符合準則要求且結果具科學一致性，因為外部審查有助提升研究可信度",
 "確認研究團隊成員之學經歷是否符合資格，因為審查重點應聚焦於人員資格而非方法內容",
 "確認研究經費編列是否合理且無超支情形，因為審查重點應聚焦於財務控管而非方法內容",
 "確認研究成果是否有利於企業對外行銷宣傳，因為審查重點應聚焦於行銷效益而非方法內容"
],ans:0,exp:"關鍵性審查由具專業資格之外部專家執行，主要確認研究方法學是否符合 ISO 14040/14044 等準則要求，結果是否具備科學一致性與合理性，以提升研究之可信度。"},

{id:34,unit:"L12203",type:"理解",q:"PCR 文件通常設有效期並定期檢討之原因為何？",opts:[
 "因技術方法與科學認知會隨時間演進而需適時更新，因為過時規則可能影響結果之代表性",
 "因主管機關要求每年須重新徵收規則使用費用，因為費用徵收與規則有效期直接相關",
 "因企業普遍要求規則內容應維持永久不變，因為規則不變動較能節省企業導入成本",
 "因驗證機構希望藉此增加額外審查收費項目，因為額外收費為設定有效期之主要目的"
],ans:0,exp:"PCR 通常設有效期並定期檢討，主要係因應技術方法、科學認知與產業實務隨時間演進，適時更新規則內容以確保計算結果之代表性與準確性。"},

{id:35,unit:"L12203",type:"理解",q:"特定產品類別 PCR 與 ISO 14067 一般性原則之關係為何？",opts:[
 "PCR 為一般性原則於特定產品類別之具體化補充規範，因為兩者須維持一致並不得相互牴觸",
 "PCR 之效力優先於一般性原則且可完全取代其規範，因為特定規則本質上高於通用原則",
 "PCR 與一般性原則屬完全獨立且互不相關之規範，因為兩者分屬不同管理體系之文件",
 "一般性原則制定後即不再適用於已有PCR之產品類別，因為PCR一旦公布即取代原則規範"
],ans:0,exp:"PCR 係依循 ISO 14067 一般性原則，針對特定產品類別訂定之具體化補充規範，兩者須維持一致性，PCR 不得與一般性原則之核心要求相互牴觸。"},

{id:36,unit:"L12203",type:"應用",q:"若企業發現所依循之 PCR 內容與自身產品實際製程有顯著落差，較適當之處理方式為何？",opts:[
 "與PCR制定單位溝通反映並於報告中揭露差異與因應方式，因為透明溝通有助維持結果可信度",
 "逕自忽略落差並直接沿用原有PCR規則計算，因為規則落差對最終結果影響通常可忽略不計",
 "逕自修改PCR內容後自行對外發布使用，因為企業本身最了解自身產品之實際製程內容",
 "因規則落差而放棄該產品之碳足跡計算工作，因為落差存在已使整體計算失去實務意義"
],ans:0,exp:"發現 PCR 與實際製程有顯著落差時，應與制定單位溝通反映，並於報告中揭露相關差異與因應處理方式，而非逕自忽略、片面修改或放棄計算，以維持結果之透明性與可信度。"},

{id:37,unit:"L12203",type:"應用",q:"某公司跨足多項產品類別欲逐步導入產品碳足跡標示，較合適之推動順序為何？",opts:[
 "依各產品類別排放占比與資料可取得性排定優先順序，因為此舉有助有效配置有限之導入資源",
 "依各產品類別之市場銷售金額由低至高排定順序，因為銷售金額越低之產品越應優先處理",
 "依各產品類別上市時間先後隨機排定順序，因為上市時間先後與碳足跡導入優先順序無關",
 "一次性同步導入全部產品類別不區分先後順序，因為同步導入較能展現企業推動之決心"
],ans:0,exp:"跨足多項產品類別逐步導入碳足跡標示時，應依各類別之排放占比重要性與資料可取得性排定優先順序，以有效配置有限之導入資源並提升推動成效。"},

{id:38,unit:"L12204",type:"理解",q:"「初級數據」與「次級數據」之主要差異為何？",opts:[
 "初級數據來自企業實際量測或直接蒐集，次級數據則來自資料庫或文獻估算，因為兩者取得方式不同",
 "初級數據僅適用於範疇一計算，次級數據僅適用於範疇二計算，因為兩者適用範疇完全不同",
 "初級數據準確度必然低於次級數據，因為次級數據皆經過嚴謹審查故較為可靠",
 "兩種數據於碳足跡計算中之角色與定義完全相同，因為準則並未特別區分此二種數據來源"
],ans:0,exp:"初級數據係企業自行實際量測或直接蒐集而得（如自身用電度數），次級數據則來自公開資料庫、文獻或產業平均值估算，兩者取得方式不同，通常初級數據之代表性較高。"},

{id:39,unit:"L12204",type:"理解",q:"製程地圖繪製時「單元流程」之意義為何？",opts:[
 "生命週期中可獨立蒐集投入產出數據之最小分析單位，因為此劃分有助系統性蒐集活動數據",
 "企業內部負責碳盤查業務之專責部門單位，因為此單位負責統籌整體製程地圖繪製工作",
 "產品於市場銷售時所使用之最小包裝規格單位，因為此單位與製程地圖繪製並無直接關聯",
 "企業財務報表中用以分類成本之會計單位，因為此單位與製程地圖繪製並無直接關聯"
],ans:0,exp:"單元流程係生命週期中可獨立蒐集投入與產出數據之最小分析單位（如某一製程步驟），為繪製製程地圖與系統性蒐集活動數據之基礎概念。"},

{id:40,unit:"L12204",type:"應用",q:"繪製製程地圖後，進行「質量與能量平衡檢核」之主要目的為何？",opts:[
 "確認投入與產出數據合理一致以提升數據品質，因為不合理落差可能顯示資料蒐集有誤",
 "確認產品最終定價是否符合市場行情水準，因為平衡檢核與產品定價策略直接相關",
 "確認員工排班是否符合勞動法規相關要求，因為平衡檢核與員工排班安排直接相關",
 "確認企業行銷預算編列是否合理適當，因為平衡檢核與行銷預算編列直接相關"
],ans:0,exp:"質量與能量平衡檢核用以確認製程地圖各單元流程之投入與產出數據是否合理一致，若出現顯著落差，可能顯示資料蒐集或估算過程有誤，需進一步查核修正。"},

{id:41,unit:"L12204",type:"應用",q:"富林農場製程地圖顯示「灌溉抽水」單元流程之能源投入數據與實際電費帳單差異甚大，應如何處理？",opts:[
 "重新核對活動數據來源與計算方式並修正誤差，因為數據品質攸關後續碳足跡計算之準確性",
 "直接採用製程地圖原始估算數據而不做任何調整，因為地圖數據本身已具備足夠參考價值",
 "直接採用電費帳單數據取代但不記錄調整原因，因為調整原因之記錄對報告品質並無影響",
 "忽略此項差異並持續使用有問題之原始數據，因為個別單元流程誤差對整體結果影響有限"
],ans:0,exp:"發現製程地圖數據與實際帳單有顯著落差時，應重新核對活動數據來源與計算方式，並記錄修正原因與過程，以確保後續碳足跡計算之準確性與可追溯性。"},

{id:42,unit:"L12205",type:"理解",q:"活動數據依取得方式可分為量測、計算與估算三種類型，其可靠程度排序原則為何？",opts:[
 "通常量測數據可靠程度高於計算數據，計算數據又高於估算數據，因為取得方式愈直接愈具代表性",
 "通常估算數據可靠程度最高，因為估算過程已綜合考量多方專業經驗判斷",
 "三種類型數據之可靠程度完全相同，因為準則並未針對取得方式進行任何區分",
 "計算數據可靠程度必然高於量測數據，因為計算過程經過公式驗證較不易出錯"
],ans:0,exp:"一般而言，活動數據之可靠程度依取得方式直接程度排序，量測數據（如電錶讀數）通常優於計算數據，計算數據又優於憑經驗之估算數據。"},

{id:43,unit:"L12205",type:"理解",q:"排放係數本身之不確定性來源，通常包含哪些面向？",opts:[
 "係數所依據之技術水準、地理範圍及時間代表性等因素，因為此類因素影響係數之適用性",
 "係數制定機構之辦公室座落地點，因為機構地點與係數本身之科學性並無關聯",
 "係數文件之字體格式與版面設計，因為文件呈現方式與係數之科學準確性並無關聯",
 "係數公布時所搭配之新聞稿撰寫風格，因為新聞稿風格與係數本身之準確性並無關聯"
],ans:0,exp:"排放係數之不確定性通常來自其所依據之技術水準、適用地理範圍及時間代表性等因素，選用時應留意係數與實際排放源情境之相符程度。"},

{id:44,unit:"L12205",type:"理解",q:"進行熱點分析後，排定改善優先順序時應優先考量之因素為何？",opts:[
 "各熱點對總排放之貢獻程度及改善之可行性，因為此兩項因素有助有效配置有限改善資源",
 "各熱點所在製程之視覺美觀程度，因為外觀美觀與改善優先順序並無合理關聯",
 "各熱點所在製程之歷史悠久程度，因為製程存在時間長短與改善優先順序並無關聯",
 "各熱點所在部門之員工人數多寡，因為部門人力規模與改善優先順序並無合理關聯"
],ans:0,exp:"排定改善優先順序時，應綜合考量各熱點對總排放之貢獻程度，以及改善措施之技術與經濟可行性，以有效配置有限之改善資源並提升整體減碳效益。"},

{id:45,unit:"L12205",type:"應用",q:"企業欲對外溝通產品碳足跡結果以取得消費者信任，較適當之呈現方式為何？",opts:[
 "清楚說明計算範圍方法學依據及數值意義，因為完整脈絡有助消費者正確理解與解讀結果",
 "僅呈現一個簡化總數而不附帶任何補充說明，因為簡化呈現較能吸引消費者注意目光",
 "刻意省略對企業較不利之計算環節內容，因為選擇性呈現較能維持企業良好品牌形象",
 "使用大量專業術語且不加以任何白話說明，因為專業術語較能展現企業技術權威地位"
],ans:0,exp:"對外溝通產品碳足跡結果時，應清楚說明計算範圍、方法學依據與數值意義，協助消費者正確理解結果之代表性與侷限性，而非僅呈現簡化數字或選擇性揭露。"},

{id:46,unit:"L12205",type:"應用",q:"不同企業產品欲進行碳足跡數值直接比較時，應留意之前提條件為何？",opts:[
 "應確認雙方採用相同或可比之系統邊界功能單位及方法學，因為條件不一致將使比較結果失去意義",
 "只要兩項產品皆已完成碳足跡計算即可直接比較，因為完成計算本身已代表結果具備可比性",
 "只要兩項產品屬於相同企業集團即可直接比較，因為同一集團產品之計算基礎必然完全一致",
 "只要兩項產品之售價區間相近即可直接比較，因為售價相近代表兩者碳足跡水準亦應相近"
],ans:0,exp:"進行產品碳足跡數值比較前，應確認雙方是否採用相同或可比之系統邊界、功能單位與方法學，否則即便皆完成計算，比較結果仍可能失去意義或造成誤導。"},

{id:47,unit:"L12205",type:"應用",q:"某公司欲委託第三方查證其產品碳足跡計算結果，查證機構主要確認之重點為何？",opts:[
 "計算方法是否符合ISO14067規範且數據來源具可追溯性，因為此為查證產品碳足跡之核心工作",
 "產品於市場上之實際銷售業績表現，因為銷售業績與碳足跡計算結果查證並無直接關聯",
 "產品包裝設計之視覺美觀程度，因為包裝美觀與碳足跡計算結果查證並無直接關聯",
 "產品定價是否具備市場競爭優勢，因為定價競爭力與碳足跡計算結果查證並無直接關聯"
],ans:0,exp:"產品碳足跡查證主要確認計算方法是否符合 ISO 14067 等規範要求，數據來源與假設是否具可追溯性及合理性，而非銷售業績、包裝設計或定價策略等面向。"},

{id:48,unit:"L12205",type:"應用",q:"富林農場欲評估「活動數據時間代表性」是否足夠，應優先檢視之項目為何？",opts:[
 "所蒐集數據之期間是否涵蓋完整生產季節或年度週期，因為片段期間可能無法反映整體實際情形",

const OPT_KEYS = ["A","B","C","D"];
const container = document.getElementById("quizContainer");
const nav = document.getElementById("sectionNav");
const emptyState = document.getElementById("emptyState");

let unitOrder = Object.keys(UNITS);
unitOrder.forEach(code=>{
  const a = document.createElement("a");
  a.href = "#unit-"+code;
  a.textContent = code;
  nav.appendChild(a);
});

function render(){
  container.innerHTML = "";

  unitOrder.forEach(code=>{
    const items = QUESTIONS.filter(q=>q.unit===code);
    if(!items.length) return;

    const block = document.createElement("div");
    block.className = "unit-block";
    block.id = "unit-"+code;

    const title = document.createElement("div");
    title.className = "unit-title";
    title.innerHTML = `<span class="unit-code">${code}</span><h2>${UNITS[code]}</h2>`;
    block.appendChild(title);

    items.forEach(item=>{
      const card = document.createElement("div");
      card.className = "qcard";
      card.dataset.type = item.type;
      card.dataset.searchtext = (item.q + " " + item.opts.join(" ") + " " + item.exp).toLowerCase();

      const optsHtml = item.opts.map((o,i)=>`<li><span class="opt-key">${OPT_KEYS[i]}.</span>${o}</li>`).join("");

      card.innerHTML = `
        <div class="qhead">
          <span class="qnum">Q${item.id}</span>
          <span class="tag ${item.type==='理解'?'l':'a'}">${item.type==='理解'?'進階理解':'情境應用'}</span>
        </div>
        <div class="qtext">${item.q}</div>
        <ul class="options">${optsHtml}</ul>
        <details>
          <summary>顯示答案與解析</summary>
          <div class="answer-box">
            <div class="ans-line">正確答案：${OPT_KEYS[item.ans]}．${item.opts[item.ans]}</div>
            <div class="exp">解析：${item.exp}</div>
          </div>
        </details>
      `;
      block.appendChild(card);
    });

    container.appendChild(block);
  });

  applyFilters();
}

let currentType = "all";
function applyFilters(){
  const keyword = document.getElementById("searchBox").value.trim().toLowerCase();
  const cards = document.querySelectorAll(".qcard");
  let visibleCount = 0;

  cards.forEach(card=>{
    const typeMatch = currentType === "all" || card.dataset.type === currentType;
    const searchMatch = !keyword || card.dataset.searchtext.includes(keyword);
    const show = typeMatch && searchMatch;
    card.classList.toggle("hidden", !show);
    if(show) visibleCount++;
  });

  document.querySelectorAll(".unit-block").forEach(block=>{
    const visibleInBlock = block.querySelectorAll(".qcard:not(.hidden)").length;
    block.style.display = visibleInBlock ? "" : "none";
  });

  emptyState.classList.toggle("show", visibleCount === 0);
}

document.querySelectorAll(".chip[data-filter-type]").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".chip[data-filter-type]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentType = btn.dataset.filterType;
    applyFilters();
  });
});

document.getElementById("searchBox").addEventListener("input", applyFilters);

render();
</script>
