<footer>富林有機農場 × 城邦技術顧問｜淨零碳規劃管理師 第二科模擬試題（第二套）v1.0</footer>

<script>
const questions = [
{q:"依《京都議定書》及現行盤查規範，溫室氣體種類共列管七種，下列何者不屬於此七種列管氣體？",
 opts:["三氟化氮（NF3）","臭氧（O3）","六氟化硫（SF6）","氫氟碳化物（HFCs）"],ans:1,tag:"基礎",
 note:"現行列管之七種溫室氣體為CO2、CH4、N2O、HFCs、PFCs、SF6及NF3，臭氧（O3）雖為溫室相關氣體，但非屬京都議定書列管之七種溫室氣體。"},

{q:"依ISO14064-1組織型盤查一般作業流程，下列步驟排序何者正確？",
 opts:["數據蒐集→邊界界定→計算→報告撰寫","邊界界定→排放源鑑別→數據蒐集→計算→品質管理→報告撰寫","報告撰寫→邊界界定→計算→數據蒐集","計算→邊界界定→數據蒐集→報告撰寫"],ans:1,tag:"作業流程",
 note:"組織型盤查一般作業流程依序為：邊界界定→排放源鑑別→數據蒐集→排放量計算→品質管理（QA/QC）→報告撰寫，此順序確保盤查結果之完整性與正確性。"},

{q:"溫室氣體排放係數所採用之全球暖化潛勢（GWP）值，目前國際盤查規範主要參考下列何機構之評估報告？",
 opts:["世界銀行（World Bank）","政府間氣候變遷專門委員會（IPCC）","世界氣象組織（WMO）","國際能源總署（IEA）"],ans:1,tag:"基礎",
 note:"GWP值主要參考IPCC歷次評估報告（如AR5、AR6）所公布之數值，作為各溫室氣體換算為CO2當量之依據。"},

{q:"某企業盤查發現一項排放源，其排放量占總排放量比例極低，但因涉及製程核心機密，企業考量後決定不予揭露。依ISO14064-1原則，此作法是否適當？",
 opts:["適當，機密資訊本可不予揭露","不適當，任何排放源之排除皆須基於重大性或數據可得性等客觀理由並揭露原因，而非以機密為由排除","適當，只要排放量低於1%即可自由排除且無需說明","不適當，但只要總量正確即可，排除原因無須揭露"],ans:1,tag:"透明度原則",
 note:"依ISO14064-1透明度原則，任何排放源之排除須基於重大性、數據可得性等客觀理由，並於報告中揭露排除項目及理由，不得以機密為由片面排除且不揭露。"},

{q:"某企業113年度使用燃料油3,000公升（排放係數3.15 kgCO2e/公升）供自有鍋爐使用，並外購電力80,000度（排放係數0.495 kgCO2e/度）。請問該企業之總排放量約為多少公噸CO2e？",
 opts:["9.45","39.6","49.05","94.5"],ans:2,tag:"計算題",
 note:"燃料油：3,000×3.15＝9,450kg＝9.45公噸；電力：80,000×0.495＝39,600kg＝39.6公噸；合計9.45＋39.6＝49.05公噸CO2e。"},

{q:"某企業使用一台空調系統，冷媒原始填充量為0.02公噸，GWP值為2,088，年度盤查時經檢測發現實際補充量為填充量之3%。請問該年度冷媒逸散排放量約為多少？",
 opts:["1.2528tCO2e","12.528tCO2e","0.12528tCO2e","125.28tCO2e"],ans:0,tag:"計算題",
 note:"補充量＝20kg×3%＝0.6kg；排放量＝0.6kg×2,088＝1,252.8kgCO2e＝1.2528公噸CO2e。"},

{q:"依GHG Protocol Scope 3類別分類，「員工通勤」係屬於下列哪一個類別？",
 opts:["類別4：上游運輸與配送","類別6：商務差旅","類別7：員工通勤","類別9：下游運輸與配送"],ans:2,tag:"範疇分類",
 note:"依GHG Protocol Scope 3的15項類別分類，「員工通勤」屬於類別7，「商務差旅」則屬於類別6，兩者屬性不同須分別計算。"},

{q:"某企業員工搭乘飛機出差進行商務差旅，此差旅產生之排放應歸屬為GHG Protocol範疇三之哪一類別？",
 opts:["類別6：商務差旅","類別7：員工通勤","類別9：下游運輸與配送","類別1：採購商品與服務"],ans:0,tag:"範疇分類",
 note:"員工因公務出差搭乘飛機、高鐵等交通工具所產生之排放，應歸屬於GHG Protocol範疇三類別6「商務差旅」。"},

{q:"企業委外處理廠內產生之一般事業廢棄物，該廢棄物於外部處理廠焚化所產生之排放，應歸屬為下列何範疇？",
 opts:["範疇一：直接排放","範疇二：能源間接排放","範疇三：其他間接排放（廢棄物處理）","不需計入盤查邊界"],ans:2,tag:"範疇分類",
 note:"委外處理之廢棄物（企業不具處理設施之控制權）於外部產生之排放，應歸屬為範疇三類別5「營運產生廢棄物」之其他間接排放。"},

{q:"依GHG Protocol，燃料開採、提煉、運輸至企業使用前之上游排放（Well-to-Tank），應歸屬為下列哪一類別？",
 opts:["範疇一：直接排放","範疇三類別3：燃料與能源相關活動","範疇三類別4：上游運輸與配送","範疇二：能源間接排放"],ans:1,tag:"範疇分類",
 note:"燃料及能源產品自開採、提煉至運送至企業使用前所產生之上游排放（不含燃燒本身），屬於GHG Protocol範疇三類別3「燃料與能源相關活動」。"},

{q:"依ISO14064-1規範，企業之溫室氣體盤查品質管理（QA/QC）主要目的為何？",
 opts:["確保盤查結果符合企業對外行銷需求","確保數據蒐集、計算與報告過程之一致性、正確性與可重現性","僅為滿足查驗機構之形式要求","降低企業盤查成本，減少數據蒐集工作"],ans:1,tag:"品質管理",
 note:"品質管理（QA/QC）之核心目的在於確保盤查過程中數據蒐集、計算方法與報告撰寫具一致性、正確性與可重現性，以提升盤查結果之可信度。"},

{q:"依ISO14064-3規範，查驗機構對盤查報告出具之保證等級，主要區分為下列哪兩種？",
 opts:["合理保證與有限保證","高度保證與低度保證","完全保證與部分保證","絕對保證與相對保證"],ans:0,tag:"ISO14064-3",
 note:"依ISO14064-3規範，查驗（Verification）之保證等級主要區分為「合理保證（Reasonable Assurance）」與「有限保證（Limited Assurance）」兩種，兩者對應之查證程序深度不同。"},

{q:"依查驗規範，「合理保證」相較「有限保證」，其查證程序之嚴謹程度為何？",
 opts:["合理保證程序較寬鬆，僅需書面審查","合理保證程序較嚴謹，通常涉及更深入之現場查核與證據蒐集","兩者查證程序完全相同","有限保證僅適用於製造業"],ans:1,tag:"ISO14064-3",
 note:"「合理保證」相較「有限保證」，其查證程序更為嚴謹，通常涉及更深入之現場查核、抽樣測試與證據蒐集，以降低重大不實表達之風險至可接受之低水準。"},

{q:"企業辦理溫室氣體盤查時，判斷某項數據是否須納入盤查邊界之「重大性原則（Materiality）」，其核心概念為何？",
 opts:["僅計入排放量超過1,000公噸之排放源","評估該排放源之遺漏或誤述是否可能影響報告使用者之判斷或決策","僅適用於範疇一排放，範疇三不適用","由查驗機構單方面決定，企業無須自行評估"],ans:1,tag:"重大性原則",
 note:"重大性原則之核心概念為評估某排放源之遺漏、誤述是否可能影響報告使用者（如主管機關、投資人）之判斷或決策，而非單純以絕對排放量門檻認定。"},

{q:"依碳中和／淨零相關盤查規範，企業針對「移除計畫（Removal Project）」進行核算時，判定其減量成效是否具「外加性」之關�025鍵在於？",
 opts:["計畫是否已取得政府補助","若無該計畫，該減量或移除成果原本是否不會發生","計畫執行單位是否為上市公司","計畫地點是否位於國家公園範圍內"],ans:1,tag:"外加性",
 note:"外加性之判定關鍵在於：若無該減量或移除計畫之推動，該減排/移除成果原本不會自然發生，此為碳權品質評估之核心原則。"},

{q:"某企業盤查其公務車輛之排放量，同時取得車輛之「年度總行駛里程數」與「油品耗用發票」兩種數據來源，下列何種計算方式較能反映實際排放量？",
 opts:["優先採用實際油品耗用量（活動數據）搭配對應油品排放係數計算","優先採用里程數搭配車輛原廠公告之平均油耗推算","兩者結果必然相同，可任選其一","僅能採用里程數法，發票數據不具參考性"],ans:0,tag:"活動數據",
 note:"當企業可取得實際油品耗用量（如發票、加油紀錄）時，應優先採用該實際活動數據搭配對應排放係數計算，較里程數推算法更能反映實際排放情形。"},

{q:"依ISO14064-2規範（計畫層級溫室氣體量化與報告），下列何者為訂定「基準線情境（Baseline Scenario）」之主要目的？",
 opts:["作為計畫執行後之實際排放量","作為評估計畫減量成效之比較基準","僅為滿足行政程序要求","與外加性判定無關"],ans:1,tag:"ISO14064-2",
 note:"基準線情境係假設若無該減碳計畫執行，排放源原本可能發生之排放狀態，作為評估計畫實際減量成效之比較基準，亦與外加性判定密切相關。"},

{q:"依ISO14064-2規範，減量計畫之「監測計畫（Monitoring Plan）」應包含下列何項要素？",
 opts:["僅需記載計畫總投資金額","應載明監測參數、監測方法、頻率及品質保證措施","僅需記載計畫執行單位名稱","監測計畫非屬ISO14064-2必要文件"],ans:1,tag:"ISO14064-2",
 note:"監測計畫為ISO14064-2要求之必要文件，應載明監測參數、監測方法、監測頻率及相關品質保證（QA/QC）措施，以確保減量成效可被驗證。"},

{q:"依環境部規定，企業溫室氣體排放量盤查所使用之原始活動數據及計算佐證資料，一般建議至少保存多久，以利日後查證追溯？",
 opts:["1年","3年","5年","永久保存，無期限規定"],ans:2,tag:"文件保存",
 note:"依一般盤查規範及稽核慣例，企業應至少保存原始活動數據及計算佐證資料5年，以利日後查證機構或主管機關進行追溯查核。"},

{q:"某企業於盤查邊界內同時生產A、B兩種聯產品，共用同一製程之能源投入。依ISO14067規範，計算各聯產品分攤之排放量時，應優先採用下列何種原則？",
 opts:["優先採用經濟分配","優先考量無分配（如系統邊界擴展），其次物理性分配，最後才採經濟分配","僅能依產量比例分配，無其他選項","聯產品排放無法計算，應排除於盤查邊界外"],ans:1,tag:"分配方法",
 note:"依ISO14067規範，聯產品排放分配應優先考量「無分配」（如透過系統邊界擴展避免分配），其次為「物理性分配」（如依質量、能量比例），最後才採用「經濟分配」（依市場價值比例）。"},

{q:"下列何者為ISO14067規範中，產品碳足跡計算採「系統邊界擴展（System Expansion）」之主要目的？",
 opts:["擴大產品之銷售市場範圍","透過納入替代產品之避免排放，避免聯產品分配爭議","增加產品之碳足跡標示等級","僅適用於農產品計算"],ans:1,tag:"ISO14067",
 note:"系統邊界擴展係透過將聯產品所替代之其他產品之「避免排放」納入計算，以避免採用武斷之分配比例，是ISO14067及ISO14044建議優先考慮之方法。"},

{q:"依產品碳足跡計算之系統邊界範疇，「從搖籃到大門（Cradle-to-Gate）」與「從搖籃到墳墓（Cradle-to-Grave）」之主要差異為何？",
 opts:["前者僅涵蓋原料取得至工廠大門前之階段，後者則涵蓋至產品廢棄處置階段","兩者範疇完全相同","前者涵蓋範圍較後者廣","後者僅適用於服務業"],ans:0,tag:"系統邊界",
 note:"「從搖籃到大門」僅涵蓋原料取得、製造至產品離開工廠大門前之階段；「從搖籃到墳墓」則進一步涵蓋產品使用、廢棄與最終處置等完整生命週期階段。"},

{q:"依ISO14025規範，環境宣告依驗證方式與內容深度可分為Type I、II、III，其中「Type III環境宣告（如EPD）」之主要特徵為何？",
 opts:["由企業自行宣告，無須第三方查證","須依循PCR規則，並經第三方查證之量化環境資訊揭露","僅提供質性描述，不涉及量化數據","僅適用於歐盟境內企業"],ans:1,tag:"ISO14025",
 note:"Type III環境宣告（如環境產品宣告EPD）須依循產品類別規則（PCR），並經第三方查證，提供完整量化之生命週期環境資訊揭露，查證要求較Type I、II更為嚴謹。"},

{q:"依環境部相關規定，產品類別規則（PCR）文件通常訂有一定之有效期限，到期後如未更新，該PCR之效力為何？",
 opts:["永久有效，無需更新","逾期後應重新檢視或修訂，否則不得繼續作為核發碳足跡標籤之依據","僅需口頭通知即可延續效力","失效後由企業自行決定是否繼續採用"],ans:1,tag:"PCR",
 note:"PCR文件通常訂有效期限（如3年），逾期後應由制定單位重新檢視、修訂或展延，否則不宜繼續作為核發產品碳足跡標籤之計算依據，以確保方法學與時俱進。"},

{q:"企業盤查邊界圖（Boundary Diagram）之主要功能為何？",
 opts:["僅供內部工程人員參考，無須對外揭露","以圖示方式呈現組織邊界、排放源位置及類別歸屬，輔助報告使用者理解盤查範疇","純粹為美觀呈現，無實質資訊價值","僅適用於製造業，服務業無需繪製"],ans:1,tag:"報告撰寫",
 note:"盤查邊界圖以視覺化方式呈現組織邊界、各排放源位置及所屬排放類別，有助於報告使用者快速理解企業盤查範疇與邊界設定邏輯，為報告書常見輔助內容。"},

{q:"某製造商115年度使用液化石油氣（LPG）2,500公斤（排放係數3.0 kgCO2e/公斤）供廠內加熱使用，並外購電力60,000度（排放係數0.495 kgCO2e/度）。請問該廠115年度總排放量約為多少公噸CO2e？",
 opts:["7.5","29.7","37.2","74.4"],ans:2,tag:"計算題",
 note:"LPG：2,500×3.0＝7,500kg＝7.5公噸；電力：60,000×0.495＝29,700kg＝29.7公噸；合計7.5＋29.7＝37.2公噸CO2e。"},

{q:"依「溫室氣體排放量盤查登錄及查驗管理辦法」，事業單位排放量之查驗，原則上應多久辦理一次？",
 opts:["每半年一次","每年一次","每兩年一次","每五年一次"],ans:1,tag:"法規",
 note:"依現行盤查登錄及查驗管理辦法規定，事業單位原則上應每年辦理一次溫室氣體排放量之盤查登錄與第三方查驗。"},

{q:"依相關規範，事業單位委託查驗機構辦理盤查查證作業時，下列何種情況可能構成利益衝突，應予迴避？",
 opts:["查驗機構同時提供該企業之盤查數據蒐集顧問服務及查證服務","查驗機構具備國際認證資格","查驗機構派遣不同人員執行不同年度之查證","查驗機構收取合理之查證服務費用"],ans:0,tag:"查驗獨立性",
 note:"查驗機構若同時提供同一企業之盤查顧問服務（協助建置數據）及第三方查證服務，將構成角色衝突，有損查證獨立性與客觀性，應予迴避。"},

{q:"依GHG Protocol規範，企業計算範疇二排放時，若同時揭露「地點基礎法」與「市場基礎法」兩種結果，此作法稱為下列何者？",
 opts:["雙重計算（Double Counting），應予避免","雙重報告（Dual Reporting），為GHG Protocol建議之揭露方式","單一基礎法（Single-based Method）","僅適用於歐盟企業之特殊要求"],ans:1,tag:"GHG Protocol",
 note:"GHG Protocol Scope 2 Guidance建議企業同時揭露「地點基礎法」與「市場基礎法」兩種計算結果，稱為「雙重報告（Dual Reporting）」，以完整呈現企業之實際採購行為與電網平均狀況。"},

{q:"下列何者為判斷企業是否應將某供應商之排放納入範疇三「採購商品與服務」類別之關鍵考量？",
 opts:["供應商之股價表現","該採購項目對企業總體排放之重大性及數據可得性","供應商是否為上市公司","採購金額是否低於一定門檻，若低於門檻一律排除"],ans:1,tag:"範疇三",
 note:"判斷是否納入範疇三特定採購項目，應綜合考量該項目對企業總體排放之重大性程度及數據可得性，而非單純以採購金額或供應商上市與否作為唯一判準。"},

{q:"依ISO14064-1:2018，企業如於報告期間內變更盤查方法學（如排放係數來源），應於報告書中如何處理？",
 opts:["無須說明，逕行採用新方法學即可","應揭露方法學變更之內容、原因，並評估對歷史數據可比性之影響","僅需於下一年度報告書中說明即可，當年度無須揭露","方法學變更僅需口頭告知查驗機構"],ans:1,tag:"透明度原則",
 note:"依透明度原則，企業變更盤查方法學時，應於當年度報告書中揭露變更內容、原因，並評估該變更對歷史數據可比性之影響，必要時應同步調整或說明歷史數據之可比基礎。"},

{q:"某工廠盤查其設備逸散排放（Fugitive Emissions），下列何者屬於逸散排放之常見來源？",
 opts:["鍋爐燃燒天然氣之煙道排放","管線接頭、閥件因密封不良所產生之氣體洩漏","外購電力使用之間接排放","員工通勤產生之排放"],ans:1,tag:"範疇分類",
 note:"逸散排放（Fugitive Emissions）係指非經煙囪或排氣管道等固定排放口，而是因設備接頭、閥件密封不良等原因產生之非預期洩漏，屬於類別一直接排放之一種。"},

{q:"依水泥製造業之製程排放特性，下列何者為其主要溫室氣體排放來源？",
 opts:["僅來自燃料燃燒","石灰石煅燒過程中釋放之製程排放（化學反應產生之CO2）","僅來自員工通勤","僅來自外購電力"],ans:1,tag:"製程排放",
 note:"水泥製造業之主要排放來源除燃料燃燒外，亦包含石灰石（碳酸鈣）於窯爐煅燒過程中因化學反應分解釋放之製程排放（Process Emissions），此部分排放與燃燒無直接關聯。"},

{q:"依ISO14064-1原則，企業盤查報告中若涉及跨年度比較（如與前一年度排放量比較），下列何者為確保比較基礎一致之必要作法？",
 opts:["僅需確保報告格式相同即可，內容可不一致","應確保組織邊界、計算方法與排放係數等基礎維持一致，如有變動應揭露並評估影響","無須考量比較基礎，直接呈現數字即可","僅需比較範疇一排放，範疇二、三無須比較"],ans:1,tag:"透明度原則",
 note:"跨年度比較須確保組織邊界、計算方法、排放係數等基礎具一致性，若有變動（如邊界擴增、方法學調整），應予揭露並評估對比較結果之影響，以避免誤導報告使用者。"},

{q:"依產品碳足跡計算指引，若企業欲宣稱其產品符合「碳中和」，除計算產品碳足跡外，通常尚須完成下列何項程序？",
 opts:["僅需計算碳足跡即可宣稱碳中和，無須其他程序","須透過高品質碳權完成殘留排放之抵換，並經第三方查證","僅需繳交碳費即可宣稱碳中和","碳足跡與碳中和宣告完全無關，可各自獨立宣稱"],ans:1,tag:"碳中和",
 note:"產品宣稱「碳中和」除計算產品碳足跡（量化排放）外，尚須透過高品質碳權完成無法避免之殘留排放抵換，並經第三方查證，方符合ISO14068-1等碳中和聲明之要求。"},

{q:"某企業盤查其範疇三「售出產品使用階段」之排放，此類排放之計算通常涉及下列何種資訊？",
 opts:["產品預期使用壽命、使用階段能源消耗特性及銷售數量","僅需產品售價","僅需產品重量","僅需產品製造地點"],ans:0,tag:"範疇三",
 note:"計算「售出產品使用階段」排放，通常須掌握產品預期使用壽命、使用階段之能源或燃料消耗特性，以及當年度銷售數量等資訊，方能合理推估其使用階段之排放量。"},

{q:"依相關規範，企業盤查所使用之「活動數據」與「排放係數」，何者較屬企業自身可蒐集掌控之數據？",
 opts:["活動數據（如燃料使用量、用電度數）多屬企業自身可蒐集掌控之數據","排放係數多屬企業自身可蒐集掌控之數據","兩者皆非企業可掌控","兩者性質完全相同，無須區分"],ans:0,tag:"基礎",
 note:"活動數據（如燃料使用量、用電度數、原料採購量等）多屬企業自身營運過程中可直接蒐集掌控之數據；排放係數則多引用官方公告或國際資料庫，屬外部提供之參數。"},

{q:"依ISO14067規範，關於「二次數據（Secondary Data）」於產品碳足跡計算中之使用原則，下列敘述何者正確？",
 opts:["完全禁止使用二次數據，須全數採用一次數據","可於缺乏一次數據時使用具代表性之二次數據，惟應揭露其來源與適用性說明","二次數據優先於一次數據使用","二次數據僅適用於服務業"],ans:1,tag:"ISO14067",
 note:"依ISO14067規範，於缺乏企業自身實測之一次數據（Primary Data）時，可使用具代表性之二次數據（如產業資料庫），惟應於報告中揭露數據來源、代表性及適用性說明。"},

{q:"某工廠盤查其範疇一排放時，同時涵蓋固定源燃燒排放與移動源（廠內堆高機）排放，下列敘述何者正確？",
 opts:["移動源排放不屬於範疇一，應歸類為範疇三","固定源與移動源燃燒排放皆屬企業直接控制之排放來源，均應納入範疇一計算","僅固定源排放需計算，移動源可忽略不計","移動源排放應歸類為範疇二"],ans:1,tag:"範疇分類",
 note:"廠內自有堆高機等移動源之燃料燃燒排放，因屬企業自有設備且具直接控制權，應與固定源燃燒排放同樣歸類為範疇一（類別一）直接排放。"},

{q:"依碳盤查作業指引，企業若因設備汰換導致排放係數改變（如汰換為更高效率鍋爐），此變動對盤查報告之影響為何？",
 opts:["屬於企業內部設備管理事項，無須於報告中說明","應於報告中說明設備變更情形及其對排放量趨勢之影響，以利報告使用者正確解讀","應立即重訂基準年","此類變動不影響排放量計算"],ans:1,tag:"報告撰寫",
 note:"設備汰換（如提升能源效率）雖不必然觸及基準年重訂門檻，但仍應於報告中說明其變更情形及對排放量趨勢之影響，以利報告使用者正確解讀排放量變化之原因。"},

{q:"依生命週期評估（LCA）四大階段，下列排序何者正確？",
 opts:["目標與範疇界定→生命週期盤查分析→生命週期衝擊評估→闡釋","生命週期盤查分析→目標與範疇界定→闡釋→衝擊評估","闡釋→目標與範疇界定→盤查分析→衝擊評估","衝擊評估→盤查分析→目標與範疇界定→闡釋"],ans:0,tag:"LCA",
 note:"依ISO14040/14044規範，LCA四大階段依序為：目標與範疇界定（Goal and Scope Definition）→生命週期盤查分析（LCI）→生命週期衝擊評估（LCIA）→闡釋（Interpretation）。"},

{q:"依LCA規範，「特徵化（Characterization）」步驟之主要作用為何？",
 opts:["將不同物質之環境衝擊，依其對特定衝擊類別（如氣候變遷）之貢獻程度轉換為共同單位加總","僅為數據蒐集階段之步驟","用於決定產品最終處置方式","與衝擊評估無關，屬盤查分析步驟"],ans:0,tag:"LCA",
 note:"特徵化步驟係將分類後之不同物質，依其對特定衝擊類別（如氣候變遷、酸化等）之相對貢獻程度（如GWP值），轉換為共同單位（如CO2當量）後加總，形成該衝擊類別之指標結果。"},

{q:"依環境部產品碳足跡標籤申請規定，企業取得標籤後，通常設有一定之有效期限，到期後應如何處理？",
 opts:["標籤永久有效，無需重新申請","應於效期屆滿前依規定重新申請或展延，並視實際生產狀況更新計算數據","標籤到期後自動失效，且不得再重新申請","僅需口頭通知環境部即可延續效力"],ans:1,tag:"碳足跡標籤",
 note:"產品碳足跡標籤通常設有效期限（如3年），企業應於效期屆滿前依規定重新申請或辦理展延，並依實際生產狀況更新其計算數據，以確保標示資訊之時效性與正確性。"},

const quiz = document.getElementById('quiz');
let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildQuiz(){
  quiz.innerHTML = '';
  questions.forEach((item,qi)=>{
    const card = document.createElement('div');
    card.className='q-card';
    card.id='card-'+qi;

    const head = document.createElement('div');
    head.className='q-head';
    head.innerHTML = `<span class="q-num">Q${qi+1}</span><span class="q-text">${item.q}</span><span class="badge">${item.tag||''}</span>`;
    card.appendChild(head);

    const ul = document.createElement('ul');
    ul.className='options';
    const letters=['A','B','C','D'];
    item.opts.forEach((opt,oi)=>{
      const li=document.createElement('li');
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML = `<b>${letters[oi]}.</b> ${opt}`;
      btn.onclick = ()=>selectAnswer(qi,oi,btn);
      li.appendChild(btn);
      ul.appendChild(li);
    });
    card.appendChild(ul);

    const exp = document.createElement('div');
    exp.className='explain';
    exp.id='exp-'+qi;
    exp.innerHTML = `<b>詳解：</b>${item.note || '請對照相關法規條文與ISO標準原則自行核對。'}`;
    card.appendChild(exp);

    quiz.appendChild(card);
  });
  updateScore();
}

function selectAnswer(qi, oi, btn){
  if(answered[qi]) return;
  answered[qi]=true;
  const card = document.getElementById('card-'+qi);
  const btns = card.querySelectorAll('.opt-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===questions[qi].ans) b.classList.add('correct');
    else if(i===oi) b.classList.add('wrong');
  });
  if(oi===questions[qi].ans) correctCount++;
  document.getElementById('exp-'+qi).classList.add('show');
  updateScore();
}

function revealAll(){
  questions.forEach((item,qi)=>{
    if(!answered[qi]){
      answered[qi]=true;
      const card = document.getElementById('card-'+qi);
      const btns = card.querySelectorAll('.opt-btn');
      btns.forEach((b,i)=>{
        b.disabled=true;
        if(i===item.ans) b.classList.add('correct');
      });
      document.getElementById('exp-'+qi).classList.add('show');
    }
  });
  updateScore(true);
}

function resetAll(){
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  buildQuiz();
}

function updateScore(finalReveal){
  const answeredCount = answered.filter(Boolean).length;
  const box = document.getElementById('score-box');
  if(answeredCount===0){ box.textContent=''; return; }
  box.textContent = `已作答 ${answeredCount}/${questions.length} 題　正確 ${correctCount} 題`;
}

buildQuiz();
</script>
