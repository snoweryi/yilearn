    <h1>L12 淨零碳盤查規範與程序</h1>
    <div id="quiz-container"></div>

    <script>
        const questions = [
            { q: "1. 某半導體封裝廠進行 ISO 14064-1 盤查，廠內發電機使用之柴油應列入哪一類？", o: ["類別 1 (直接排放)", "類別 2 (能源間接排放)", "類別 3 (運輸間接排放)", "類別 4 (組織使用產品之排放)"], a: "A", e: "自有設備之燃料燃燒，屬於組織控制範圍內的直接排放。" },
            { q: "2. 關於 ISO 14067「搖籃到大門」(Cradle-to-Gate)，其邊界定義為何？", o: ["從原料取得至產品出廠", "從原料取得至產品報廢回收", "僅包含生產過程的直接排放", "從產品運輸至零售點"], a: "A", e: "大門指製造商出廠，不含後續運輸、使用及廢棄階段。" },
            { q: "3. 若企業購買綠電憑證 (T-REC)，在 ISO 14064-1 中針對「類別 2」排放量，下列敘述何者正確？", o: ["僅能使用位置基礎法計算", "僅能使用市場基礎法計算", "市場基礎法可納入減項計算", "無論何種方式，憑證均不得扣除"], a: "C", e: "位置基礎法反映電網平均碳係數，市場基礎法允許透過憑證進行減項調整。" },
            { q: "4. 針對 ISO 14064-1 盤查，下列何者屬於「營運控制權」的判定依據？", o: ["是否擁有工廠土地產權", "是否能主導導入環境管理政策", "員工總人數規模", "是否為該產業排名前五大"], a: "B", e: "營運控制權強調的是對營運政策的控制力，而非僅是資產所有權。" },
            { q: "5. ISO 14067 分配原則中，當製程產生多項產品時，優先順序為何？", o: ["經濟價值分配 > 物理關係分配 > 系統擴張", "系統擴張 > 物理關係分配 > 經濟價值分配", "直接平分", "依據生產天數分配"], a: "B", e: "標準要求優先透過系統擴張來避免分配，其次才是物理性質，最後才使用經濟價值。" },
            { q: "6. 若企業盤查發現「員工出差搭乘飛機」，應歸類於 ISO 14064-1 哪一類別？", o: ["類別 1", "類別 2", "類別 3", "類別 6"], a: "C", e: "員工商務旅行屬於運輸間接排放，屬於類別 3。" },
            { q: "7. 在產品碳足跡盤查中，何者為「活動數據」(Activity Data)？", o: ["產品的碳排放係數", "電費收據上的度數", "溫室氣體全球暖化潛勢 (GWP)", "產品預計使用年限"], a: "B", e: "活動數據是量化溫室氣體排放的基礎數值（如度、公升、公斤），係數是外部參數。" },
            { q: "8. 企業使用之「外購蒸氣」進行生產，在 ISO 14064-1 中應計入哪一類別？", o: ["類別 1", "類別 2", "類別 3", "類別 4"], a: "B", e: "外購能源（電力、熱、蒸氣）的產生屬於能源間接排放，即類別 2。" },
            { q: "9. 下列何者不屬於 ISO 14064-1 報告書應包含的內容？", o: ["盤查邊界說明", "溫室氣體量化方法", "未來 50 年的減碳路徑規劃", "排除之排放源說明"], a: "C", e: "報告書需呈現盤查結果，而非長期的企業經營策略規劃。" },
            { q: "10. 若供應商無法提供精確係數，企業在 ISO 14067 盤查時應優先？", o: ["直接填寫零", "使用政府公告之次級資料庫係數", "自行推估係數", "省略此項排放不計算"], a: "B", e: "在缺乏初級數據時，應採用具公信力之次級資料庫數據以符合保守性原則。" },
            { q: "11. 關於 GWP (全球暖化潛勢)，下列敘述何者正確？", o: ["GWP 數值越高，代表該氣體對暖化的影響越小", "GWP 僅用於計算二氧化碳", "不同氣體的 GWP 會隨 IPCC 報告更新而調整", "GWP 永遠固定不變"], a: "C", e: "GWP 數值會隨氣候變遷科學研究更新，例如不同版次的 AR5, AR6。" },
            { q: "12. 碳足跡盤查的「生命週期」概念中，不包含下列哪一個階段？", o: ["原物料採集", "製造加工", "廣告行銷", "廢棄處理"], a: "C", e: "廣告行銷通常屬於企業營運活動，非產品生命週期內的實體流程。" },
            { q: "13. 關於 ISO 14064-1 的「重大性」(Materiality) 觀念，下列何者正確？", o: ["指所有排放源都必須 100% 精確", "指對盤查結果有顯著影響之排放源", "指僅有類別 1 的排放", "與數據不確定性完全無關"], a: "B", e: "重大性旨在確保數據誤差不會影響決策者對組織排放績效的判斷。" },
            { q: "14. 產品碳足跡盤查中，若數據缺漏且影響重大，應採取何種行動？", o: ["直接忽視", "進行製程實地量測 (初級數據蒐集)", "隨意假設", "直接購買碳權抵銷"], a: "B", e: "面對重大且缺漏的關鍵數據，應回歸實地量測以確保數據品質。" },
            { q: "15. 某企業使用廢棄物焚化回收熱能，此排放應由何者承擔？", o: ["廢棄物產生者", "焚化爐操作者", "使用熱能者", "政府"], a: "B", e: "除非有特殊合約規定，一般而言由營運控制焚化設施者負責。" },
            { q: "16. 進行組織盤查時，何者屬於「人為逸散」排放源？", o: ["辦公室冷氣冷媒填充", "生產機台燃燒天然氣", "員工飲水機用電", "運輸車輛排氣"], a: "A", e: "冷媒逸散屬於類別 1 之逸散排放。" },
            { q: "17. 下列何者不屬於「溫室氣體清冊」的組成要素？", o: ["排放源識別", "量化方法", "數據品質管理程序", "產品廣告文案"], a: "D", e: "溫室氣體清冊是針對碳數據的管理文件，而非產品行銷資料。" },
            { q: "18. 在 ISO 14067 中，「產品類別規則」(PCR) 的主要功能為何？", o: ["規範產品售價", "確保同類產品碳足跡計算具可比性", "限制產品產量", "設定產品碳費率"], a: "B", e: "PCR 提供一致的計算規則，讓市場上的同類產品可以進行公平比較。" },
            { q: "19. 若公司租賃大樓辦公，電費包含在租金中且無法獨立計量，應如何歸類？", o: ["排除不計", "估算面積比例後納入類別 2", "列入類別 1", "列入類別 6"], a: "B", e: "無法獨立計量時，可採面積或人員比例進行合理估算並納入盤查。" },
            { q: "20. 企業推動「綠色包裝」，主要是在減少產品生命週期哪一階段的碳排放？", o: ["原物料階段", "運輸或廢棄階段", "使用階段", "研發階段"], a: "B", e: "包裝減重可減少運輸能耗，包裝材質選用則影響廢棄階段處理。" },
            { q: "21. 下列何者為 ISO 14064-1 中「類別 6」的範疇？", o: ["廠內燃油燃燒", "外購電力", "非組織控制之其他間接排放", "產品使用階段排放"], a: "C", e: "類別 6 定義為其他間接排放，為非屬類別 2~5 之部分。" },
            { q: "22. 盤查報告書中的「數據品質評估」，主要評估內容為何？", o: ["數據的時效性、準確性與完整性", "數據的成本高低", "供應商的規模大小", "員工填寫數據的時間"], a: "A", e: "ISO 標準強調數據的代表性、準確性與一致性。" },
            { q: "23. 針對 CBAM 要求，出口商最需強化的是？", o: ["組織型盤查", "產品碳足跡查證", "企業 CSR 報告", "公司營收報告"], a: "B", e: "CBAM 針對的是產品本身的碳含量，故產品碳足跡數據至關重要。" },
            { q: "24. 下列哪一種氣體目前不屬於京都議定書或 ISO 14064-1 核心管制項目？", o: ["二氧化碳 (CO2)", "甲烷 (CH4)", "氮氣 (N2)", "氫氟碳化物 (HFCs)"], a: "C", e: "氮氣為空氣主要成分，並非溫室氣體。" },
            { q: "25. 完成盤查後，若要對外宣稱「碳中和」，下列敘述何者正確？", o: ["只需完成盤查即可", "必須完成盤查、減碳計畫與購買碳權抵銷", "只要買足夠的樹即可", "不必經由第三方查證"], a: "B", e: "碳中和需遵循相應標準（如 PAS 2060 或 ISO 14068），需有盤查、減排及抵銷的完整循環。" },
			{ q: "26. 某企業使用 100 公斤 SF6 氣體，已知其 GWP 值為 23,500，請問該氣體之 CO2e 為多少？", o: ["235 公噸", "2,350 公噸", "23,500 公噸", "2.35 公噸"], a: "B", e: "100 kg * 23,500 = 2,350,000 kg = 2,350 公噸。" },
            { q: "27. 在 ISO 14064-1 盤查中，針對「無法取得精確活動數據」的排放源，應採取何種處理邏輯？", o: ["直接忽視", "採用保守性原則估算", "填寫為零", "預測未來數字"], a: "B", e: "盤查需符合完整性與保守性，無法實測時應採合理估算。" },
            { q: "28. 電子製造業面對品牌商的碳足跡要求，最優先需要建置的是？", o: ["減碳行銷計畫", "產品生命週期製程地圖", "員工健走運動", "辦公室節能認證"], a: "B", e: "掌握製程地圖是產品碳足跡系統邊界界定的基礎。" },
            { q: "29. 關於 ISO 14067 的「系統邊界」，下列何者不屬於「由搖籃到大門」的盤查範圍？", o: ["原料採購", "製造過程", "產品使用階段", "半成品運輸"], a: "C", e: "使用階段屬於「搖籃到墳墓」或部分特定邊界，不屬於「搖籃到大門」。" },
            { q: "30. 供應鏈減碳中，品牌商要求供應商提供 ISO 14064-1 報告之主要目的為？", o: ["增加供應商行政負擔", "釐清供應鏈間接排放 (Scope 3) 數據", "確認供應商資產狀況", "僅作為採購篩選條件"], a: "B", e: "品牌商的 Scope 3（類別 4）即為供應商的組織型盤查範圍。" },
            { q: "31. 在 2026 碳費制度下，盤查報告書的「數據品質管理」最核心指標為？", o: ["報告書頁數", "數據準確性與可溯源性", "盤查員的職稱", "公司股價高低"], a: "B", e: "碳費計價基於數據，數據的可溯源性是避免爭議的關鍵。" },
            { q: "32. 若企業同時有「位置基礎法」與「市場基礎法」數據，報告應如何揭露？", o: ["僅擇一揭露", "兩者皆需揭露", "僅揭露較低的數值", "僅揭露較高的數值"], a: "B", e: "ISO 14064-1:2018 要求雙重報告，以呈現能源市場與電網狀況。" },
            { q: "33. 關於 PCR (產品類別規則) 之訂定，下列何者正確？", o: ["由個別企業自行決定", "需參考國際公認的 PCR 文件或經利害關係人諮詢", "與供應鏈無關", "由政府強制要求所有產品都要有"], a: "B", e: "PCR 需符合一致性與透明度，非單一廠商可獨斷。" },
            { q: "34. 辦公室採購之「一次性餐具」在組織盤查中屬於？", o: ["類別 1", "類別 2", "類別 4（購買產品）", "類別 6"], a: "C", e: "購買產品的生命週期排放屬於組織盤查的類別 4。" },
            { q: "35. 計算碳足跡時，若電力係數每年更新，企業應？", o: ["使用盤查當年度最新公告係數", "使用公司成立當年的係數", "使用 10 年前係數", "統一使用 0.5 固定值"], a: "A", e: "盤查需反映當年實際環境現況，應採用最新公告係數。" },
            { q: "36. 針對 CBAM，出口歐盟的產品需提交「碳排放報告」，主要針對？", o: ["組織總部排放", "產品生產過程的直接與能源間接排放", "員工通勤排放", "企業行政管理排放"], a: "B", e: "CBAM 初期專注於生產製程的直接與能源間接排放（電力）。" },
            { q: "37. 關於「範疇 3 (Scope 3)」與 ISO 14064-1 類別之關係，下列何者正確？", o: ["範疇 3 等於類別 1", "範疇 3 包含類別 3, 4, 5, 6", "範疇 3 僅包含電力", "範疇 3 不需盤查"], a: "B", e: "ISO 14064-1 的類別 3-6 共同構成了溫室氣體議定書的範疇 3。" },
            { q: "38. 執行查證時，查證員發現數據缺少紀錄，這違反了哪項原則？", o: ["相關性", "完整性", "透明性", "一致性"], a: "C", e: "透明性要求盤查數據需具備可查驗的紀錄與路徑。" },
            { q: "39. 員工通勤產生的碳排放，在 ISO 14064-1 中屬於？", o: ["類別 1", "類別 2", "類別 3", "類別 4"], a: "C", e: "員工通勤屬於運輸相關間接排放，歸類於類別 3。" },
            { q: "40. 碳盤查中的「關鍵路徑」是指？", o: ["盤查員上班路徑", "碳排放貢獻最高之流程", "最快完成盤查的方法", "資料輸入電腦的路徑"], a: "B", e: "找出熱點（Hotspots）是為了將資源聚焦於高排放源的改善。" },
            { q: "41. 關於「直接排放」定義，下列何者不屬於該範圍？", o: ["廠內燃燒天然氣", "廠內自有車輛加油", "外購電力", "生產過程中發生的逸散"], a: "C", e: "外購電力屬於能源間接排放（類別 2）。" },
            { q: "42. 產品碳足跡盤查結果報告中，「碳足跡數值」之單位通常為？", o: ["kg CO2e", "kWh", "人/公里", "立方公尺"], a: "A", e: "碳足跡以二氧化碳當量（CO2e）表示。" },
            { q: "43. 若生產製程中電力數據異常飆高，首要步驟為？", o: ["修改數據以符合預期", "確認電表讀數與抄表紀錄", "停止盤查", "增加冷氣溫度"], a: "B", e: "數據異常時，應優先進行回溯查核（Verification）。" },
            { q: "44. ISO 14067 鼓勵企業透過何種方式溝通碳資訊？", o: ["碳標籤", "隱藏數據", "誇大減碳效果", "僅提供 PDF 檔"], a: "A", e: "碳標籤是國際間公認的產品碳資訊溝通工具。" },
            { q: "45. 企業進行組織盤查時，關於「排除排放源」的敘述何者錯誤？", o: ["應於報告中載明理由", "只要排放量小就可以隨意排除", "排除後不影響重大性分析", "排除原因需經主管同意"], a: "B", e: "即使排放量小，仍需進行評估並確保不影響整體重大性判定。" },

            { q: "47. 關於盤查報告書之「外部查證」，主要目的為何？", o: ["增加政府稅收", "提升數據公信力與品質", "減少企業排放量", "增加員工盤查技能"], a: "B", e: "第三方查證是為確保數據符合標準且具可信度。" },

            { q: "50. 首席命題委員觀點：企業在 2026 年盤查時，最應具備的素養是？", o: ["精通各種碳盤查軟體操作", "具備連結營運數據與碳數據之邏輯思考能力", "能背誦所有 ISO 標準條文", "僅依賴顧問公司完成"], a: "B", e: "專業能力的精髓在於能將盤查內化為營運數據，協助企業決策。" }

        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            let optionsHTML = q.o.map((opt, idx) => 
                `<label><input type="radio" name="q${i}" value="${['A','B','C','D'][idx]}"> ${opt}</label>`
            ).join('');
            container.innerHTML += `
                <div class="question">
                    <p>${i+1}. ${q.q}</p>
                    <div class="options">${optionsHTML}</div>
                    <button onclick="document.getElementById('ans${i}').style.display='block'" style="font-size:20px">查看解答</button>
                    <div id="ans${i}" class="answer">正確答案：${q.a}<br>解析：${q.e}</div>
