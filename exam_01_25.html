    display:flex;gap:10px;align-items:baseline;margin-bottom:10px;

  .opt-btn{
    width:100%;text-align:left;

    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 14px;
    cursor:pointer;
    font-size: 22px;
    color:var(--ink);
    transition:.15s;
  }

  .opt-btn.correct{background:#e3f2e6;border-color:var(--accent);color:#1f4d38;font-weight:700;}
  .opt-btn.wrong{background:#fbe6e1;border-color:var(--wrong);color:var(--wrong);font-weight:700;}
  .opt-btn[disabled]{cursor:default;}
  .explain{
    display:none;
    margin-top:10px;
    background:#fbf6ea;
    border-left:4px solid var(--accent2);
    padding:10px 14px;
    font-size: 22px;
    border-radius:0 6px 6px 0;
    color:#4a4436;
  }
  .explain.show{display:block;}
  .tag{
    display:inline-block;font-size: 22px;
    background:#eee6d3;color:#7a5c22;
    padding:2px 9px;border-radius:10px;margin-left:8px;
  }
  footer{
    text-align:center;color:#8a8371;font-size: 22px;margin-top:30px;
  }
  .disclaimer{
    max-width:1900px;margin:20px auto;padding:14px 18px;
    background:#fff3e0;border:1px solid #e8c891;border-radius:10px;
    font-size: 22px;color:#6b4d1f;

}

<script>
const questions = [
{q:"某製造業集團計算自身溫室氣體排放時，發現其員工通勤、上下游運輸與外購原物料的隱含排放合計占總排放量近七成。依 GHG Protocol 分類，這些排放應歸屬於？",
 opts:["範疇一（直接排放）","範疇二（能源間接排放）","範疇三（其他間接排放）","不需納入盤查邊界"],
 ans:2,
 note:"員工通勤、運輸與外購原物料屬於價值鏈上下游之間接排放，依 GHG Protocol 歸類為範疇三（Scope 3）。"},

{q:"依據 SBTi 對「近期目標（Near-term Target）」之一般規範，企業設定範疇一及範疇二減碳目標時，通常應對齊何種升溫路徑？",
 opts:["2°C 路徑","1.5°C 路徑","無特定路徑要求","依企業自訂路徑即可"],
 ans:1,
 note:"SBTi 近期目標要求範疇一、二排放應對齊 1.5°C 路徑，以符合巴黎協定最嚴格之升溫控制目標。"},

{q:"COP29（2024年，亞塞拜然巴庫）在氣候融資議題上，各國同意已開發國家至2035年應帶頭籌措多少金額（NCQG）以支持開發中國家氣候行動？",
 opts:["每年1000億美元","每年3000億美元","每年5000億美元","每年1兆美元"],
 ans:1,
 note:"COP29 達成之新集體量化氣候融資目標（NCQG）為已開發國家帶頭至2035年每年籌措3000億美元。"},

{q:"依《巴黎協定》第六條第2款（Article 6.2），國家間進行雙邊合作移轉減緩成果時，須遵守下列何項原則以避免重複計算？",
 opts:["對應調整（Corresponding Adjustment）","碳邊境調整","範疇三揭露原則","影子碳價原則"],
 ans:0,
 note:"Article 6.2 要求締約方進行 ITMOs 移轉時須進行「對應調整」，即出售方需相對應增加其排放量帳，避免重複計算。"},

{q:"關於 RE100 倡議之會員資格要求，下列敘述何者正確？",
 opts:["僅限年用電量達一定規模以上之上市公司","任何規模企業皆可申請，但須承諾100%使用再生能源之目標年","僅限製造業參與","加入需經聯合國認證"],
 ans:1,
 note:"RE100 為自願性倡議，企業須承諾設定使用100%再生能源電力的目標年（通常為2050年前），並無強制產業別限制。"},

{q:"依據台灣「氣候變遷因應法」，中央主管機關對於年排放量達一定門檻之排放源，要求其應辦理下列何項法定義務？",
 opts:["繳交碳費並進行溫室氣體盤查登錄","強制購買國外碳權","停止生產排放","僅需申報但免查證"],
 ans:0,
 note:"依氣候變遷因應法，達一定規模之排放源應進行溫室氣體盤查登錄，並依規定繳交碳費。"},

{q:"台灣碳費徵收機制中，「自主減量計畫」若經審核通過，可適用下列何種優惠費率？",
 opts:["一般費率","優惠費率（依減碳目標分級適用）","免徵碳費","僅適用出口產品"],
 ans:1,
 note:"提出並通過審核的自主減量計畫，可依其設定之減碳目標與時程，適用較一般費率為低之優惠費率。"},

{q:"歐盟 CBAM（碳邊境調整機制）於過渡期（2023-2025）主要要求進口商履行下列何項義務？",
 opts:["繳納憑證費用","僅需申報進口產品之碳排放資訊，尚無需繳費","立即支付碳關稅","停止進口高碳產品"],
 ans:1,
 note:"CBAM過渡期（2023年10月至2025年底）進口商僅須申報產品內含碳排放資訊，尚不需實際購買及繳交CBAM憑證。"},

{q:"CBAM 於2026年正式生效後，其適用產品範圍原則上涵蓋以下何組產業？",
 opts:["鋼鐵、水泥、肥料、鋁、電力、氫","紡織、食品、家具、玩具","製藥、化妝品、醫材","金融、保險、資訊服務"],
 ans:0,
 note:"CBAM 主要涵蓋高碳洩漏風險產業：鋼鐵、水泥、肥料、鋁、電力與氫等。"},

{q:"依 TCFD 架構，企業因應氣候變遷所採行之低碳轉型措施導致既有資產提前報廢或閒置，此類風險屬於？",
 opts:["實體風險","轉型風險","流動性風險","信用風險"],
 ans:1,
 note:"因政策、技術或市場轉型導致資產閒置或報廢，屬於TCFD分類中的「轉型風險」。"},

{q:"TNFD（自然相關財務揭露）與 TCFD 之主要差異在於，TNFD 更聚焦於下列何種議題之財務衝擊？",
 opts:["溫室氣體排放","生物多樣性與自然資本喪失","供應鏈人權","勞動安全"],
 ans:1,
 note:"TNFD 聚焦於自然資本與生物多樣性喪失可能造成的財務風險與機會揭露，與TCFD聚焦氣候風險有所區隔。"},

{q:"IFRS S2（氣候相關揭露準則）與 TCFD 架構之關係，下列敘述何者正確？",
 opts:["IFRS S2 與 TCFD 完全無關","IFRS S2 建構於 TCFD 四大核心要素（治理、策略、風險管理、指標與目標）之上","IFRS S2 僅適用於金融業","TCFD 已被IFRS S2完全取代且不再具參考價值"],
 ans:1,
 note:"IFRS S2 之揭露架構延續並整合了 TCFD 的四大核心要素：治理、策略、風險管理、指標與目標。"},

{q:"依台灣「十二項關鍵戰略」，下列何者屬於「需求面管理」相關戰略？",
 opts:["節能","前瞻能源","氫能","碳捕捉利用及封存"],
 ans:0,
 note:"十二項關鍵戰略中，「節能」戰略著重於用電需求面管理，其餘為供給面能源技術戰略。"},

{q:"依台灣2050淨零排放路徑，運輸部門減碳之關鍵策略主要為何？",
 opts:["全面禁止私人運具","推動電動車普及與大眾運輸系統優化","僅補貼燃油車汰舊換新","停止發展公共運輸"],
 ans:1,
 note:"運輸部門淨零路徑之核心策略為推動運具電動化（如電動車、電動機車）及提升大眾運輸使用率。"},

{q:"依科學基礎減量目標倡議（SBTi），企業設定「長期目標（Long-term Target/Net-Zero Target）」時，通常要求排放量須於何時前降至淨零？",
 opts:["2030年","2040年","2050年前","無特定年限"],
 ans:2,
 note:"SBTi 淨零標準要求企業長期目標須於2050年前（部分產業更早）將範疇一至三排放降低至少90%以上並達成淨零。"},

{q:"某企業之範疇三排放僅占總排放量的25%，依SBTi一般規範，其範疇三近期目標之涵蓋比例門檻為何？",
 opts:["無須設定範疇三目標","至少涵蓋67%範疇三排放量","至少涵蓋90%範疇三排放量","至少涵蓋40%範疇三排放量"],
 ans:0,
 note:"依SBTi規範，範疇三排放占總排放量未達40%門檻者，得免強制設定範疇三近期目標（但鼓勵仍設定）。"},

{q:"依 ISO 14064-1 溫室氣體盤查標準，組織邊界之設定方法主要有哪兩種取向？",
 opts:["財務控制與營運控制","股權比例與資產比例","地理邊界與時間邊界","上游邊界與下游邊界"],
 ans:0,
 note:"ISO 14064-1 組織邊界設定主要採用「股權比例法」或「控制法（財務控制/營運控制）」兩種取向。"},

{q:"依碳揭露計畫（CDP）問卷架構，企業首次參與時建議優先完成下列何項揭露？",
 opts:["氣候變遷問卷","森林問卷","水安全問卷","塑膠問卷"],
 ans:0,
 note:"CDP問卷中，「氣候變遷（Climate Change）」問卷為企業最普遍且優先參與之基礎揭露項目。"},

{q:"Climate Action 100+ 倡議主要要求受評企業採行下列何項行動？",
 opts:["加入RE100即可","設定與巴黎協定一致之減碳目標並強化氣候治理揭露","僅需繳交碳費","停止所有化石燃料業務"],
 ans:1,
 note:"Climate Action 100+ 由機構投資人發起，要求高排放企業設定符合1.5°C路徑之減碳目標並強化治理與揭露。"},

{q:"內部碳定價機制中，「碳費模擬（Shadow Price）」之主要應用情境為何？",
 opts:["實際繳納給政府的稅費","用於企業內部投資決策評估的假設性碳成本","作為碳交易所之交易牌價","作為外部稽核依據"],
 ans:1,
 note:"影子碳價／碳費模擬並非實際繳交之費用，而是企業內部評估投資案時納入之假設性碳成本，用於決策參考。"},

{q:"下列何者非屬碳信用額度（Carbon Credit）核發前之必要審查流程？",
 opts:["基準線設定","外加性審查","計畫確證與查證","企業年度財報審計"],

const quiz = document.getElementById('quiz');
let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function buildQuiz(){
  quiz.innerHTML = '';
  questions.forEach((item,qi)=>{
    const card = document.createElement('div');
    card.className='q-card';
    card.id='card-'+qi;

    const head = document.createElement('div');
    head.className='q-head';
    head.innerHTML = `<span class="q-num">Q${qi+1}</span><span class="q-text">${item.q}</span>`;
    card.appendChild(head);

    const ul = document.createElement('ul');
    ul.className='options';
    const letters=['A','B','C','D'];
    item.opts.forEach((opt,oi)=>{
      const li=document.createElement('li');
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML = `<b>${letters[oi]}.</b> ${opt}`;
      btn.onclick = ()=>selectAnswer(qi,oi,btn);
      li.appendChild(btn);
      ul.appendChild(li);
    });
    card.appendChild(ul);

    const exp = document.createElement('div');
    exp.className='explain';
    exp.id='exp-'+qi;
    exp.innerHTML = `<b>詳解：</b>${item.note}`;
    card.appendChild(exp);

    quiz.appendChild(card);
  });
  updateScore();
}

function selectAnswer(qi, oi, btn){
  if(answered[qi]) return;
  answered[qi]=true;
  const card = document.getElementById('card-'+qi);
  const btns = card.querySelectorAll('.opt-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===questions[qi].ans) b.classList.add('correct');
    else if(i===oi) b.classList.add('wrong');
  });
  if(oi===questions[qi].ans) correctCount++;
  document.getElementById('exp-'+qi).classList.add('show');
  updateScore();
}

function revealAll(){
  questions.forEach((item,qi)=>{
    if(!answered[qi]){
      answered[qi]=true;
      const card = document.getElementById('card-'+qi);
      const btns = card.querySelectorAll('.opt-btn');
      btns.forEach((b,i)=>{
        b.disabled=true;
        if(i===item.ans) b.classList.add('correct');
      });
      document.getElementById('exp-'+qi).classList.add('show');
    }
  });
  updateScore(true);
}

function resetAll(){
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  buildQuiz();
}

function updateScore(finalReveal){
  const answeredCount = answered.filter(Boolean).length;
  const box = document.getElementById('score-box');
  if(answeredCount===0){ box.textContent=''; return; }
  box.textContent = `已作答 ${answeredCount}/${questions.length} 題　正確 ${correctCount} 題`;
}

buildQuiz();
</script>
