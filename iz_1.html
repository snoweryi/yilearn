<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>氣候公約 × 巴黎協定 × 台灣時事 · 生活化故事版</title>
<style>
  :root {
    --green: #3B6D11; --green-light: #EAF3DE; --green-mid: #639922;
    --teal: #0F6E56; --teal-light: #E1F5EE; --teal-mid: #1D9E75;
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #378ADD;
    --amber: #854F0B; --amber-light: #FAEEDA; --amber-mid: #BA7517;
    --coral: #993C1D; --coral-light: #FAECE7; --coral-mid: #D85A30;
    --gray: #444441; --gray-light: #F1EFE8; --gray-mid: #888780;
    --purple: #3C3489; --purple-light: #EEEDFE; --purple-mid: #7F77DD;
    --text: #1a1a1a; --text-muted: #555; --bg: #fff; --surface: #f8f9f2;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--surface); color: var(--text); line-height: 1.7; }
  
  /* Header */
  .hero { margin-top: 80px;background: linear-gradient(135deg, #0F6E56 0%, #3B6D11 50%, #1D9E75 100%); color: white; padding: 2.5rem 2rem; text-align: center; }
  .hero h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
  .hero p { font-size: 20px; opacity: 0.88; margin-bottom: 1rem; }
  .hero-badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .hero-badge { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 20px; padding: 4px 14px; font-size: 20px; }
  
  /* Nav Tabs */
  .nav { display: flex; gap: 4px; padding: 1rem 1.5rem 0; background:#435e50;color:#fff; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
  .nav-btn { padding: 10px 18px; border: none; background: none; cursor: pointer; font-size: 20px; font-weight: 500; color:#fff; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; border-radius: 6px 6px 0 0; }
  .nav-btn:hover { background:#fff;color:#435e50; }
  .nav-btn.active { color: yellow; border-bottom-color: var(--teal); background: var(--teal-light); }
  
  /* Sections */
  .section {  padding: 1.5rem; max-width: 1860px; margin: 0 auto; }
  .section.active { display: block; }
  
  /* Cards */
  .card { background: white; border-radius: var(--radius); border: 1px solid #e8ede0; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 20px; font-weight: 600; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-teal { background: var(--teal-light); color: var(--teal); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-coral { background: var(--coral-light); color: var(--coral); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  
  /* Story blocks */
  .story-box { background: var(--amber-light); border-left: 4px solid var(--amber-mid); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 1rem 1.25rem; margin: 0.75rem 0; }
  .story-box .label { font-size: 20px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .story-box p { font-size: 20px; color: #3d2e00; }
  
  .key-box { background: var(--teal-light); border-left: 4px solid var(--teal-mid); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 0.75rem 1.25rem; margin: 0.5rem 0; }
  .key-box .label { font-size: 20px; font-weight: 700; color: var(--teal); margin-bottom: 0.3rem; }
  .key-box p { font-size: 20px; color: #04342C; }
  
  .tip-box { background: var(--purple-light); border-left: 4px solid var(--purple-mid); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 0.75rem 1.25rem; margin: 0.5rem 0; }
  .tip-box .label { font-size: 20px; font-weight: 700; color: var(--purple); margin-bottom: 0.3rem; }
  .tip-box p { font-size: 20px; color: #26215C; }
  
  /* Article anchor */
  .article-tag { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: var(--teal); color: white; border-radius: 50%; font-weight: 700; font-size: 20px; flex-shrink: 0; }
  
  /* Quick lookup table */
  .lookup-table { width: 100%; border-collapse: collapse; font-size: 20px; }
  .lookup-table th { background: var(--teal); color: white; padding: 10px 12px; text-align: left; }
  .lookup-table td { padding: 9px 12px; border-bottom: 1px solid #eee; }
  .lookup-table tr:nth-child(even) td { background: #f8fdf8; }
  .lookup-table tr:hover td { background: var(--teal-light); }
  .star { color: #e6820e; font-size: 20px; }
  
  /* Quiz */
  .quiz-card { background: white; border-radius: var(--radius); border: 1px solid #e8ede0; padding: 1.5rem; margin-bottom: 1.25rem; }
  .quiz-num { font-size: 20px; font-weight: 700; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .quiz-q { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 1rem; line-height: 1.6; }
  .quiz-scenario { background: var(--blue-light); border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 20px; color: #042C53; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt { background: #f8f9f2; border: 1.5px solid #dde8d0; border-radius: var(--radius-sm); padding: 10px 14px; cursor: pointer; font-size: 20px; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
  .opt:hover { background: var(--teal-light); border-color: var(--teal-mid); }
  .opt.correct { background: var(--green-light); border-color: var(--green-mid); color: var(--green); font-weight: 600; }
  .opt.wrong { background: var(--coral-light); border-color: var(--coral-mid); color: var(--coral); }
  .opt.disabled { pointer-events: none; }
  .opt-label { width: 22px; height: 22px; border-radius: 50%; background: white; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
  .explanation { margin-top: 1rem; padding: 0.9rem 1rem; background: var(--green-light); border-radius: var(--radius-sm); font-size: 20px; color: var(--green); display: none; }
  .explanation.show { display: block; }
  
  /* Score board */
  .score-bar { background: white; border-radius: var(--radius); border: 1px solid #e8ede0; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .score-num { font-size: 2rem; font-weight: 700; color: var(--teal); }
  .score-label { font-size: 20px; color: var(--text-muted); }
  .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; flex: 1; min-width: 120px; }
  .progress-fill { height: 100%; background: var(--teal); border-radius: 4px; transition: width 0.4s ease; }
  
  /* Timeline */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before { content: ''; position: absolute; left: 12px; top: 4px; bottom: 4px; width: 2px; background: var(--teal-light); }
  .timeline-item { position: relative; margin-bottom: 1.2rem; }
  .timeline-dot { position: absolute; left: -2rem; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: var(--teal); border: 2px solid white; box-shadow: 0 0 0 2px var(--teal); }
  .timeline-year { font-size: 20px; font-weight: 700; color: var(--teal); margin-bottom: 2px; }
  .timeline-text { font-size: 20px; color: var(--text); }
  
  /* Grid */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  
  /* Reset btn */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: var(--radius-sm); border: 1.5px solid var(--teal); background: white; color: var(--teal); font-weight: 600; font-size: 20px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: var(--teal); color: white; }
  .btn-primary { background: var(--teal); color: white; }
  .btn-primary:hover { background: var(--teal-mid); }
  
  h2 { font-size: 1.2rem; font-weight: 700; color: var(--teal); margin-bottom: 1rem; }
  h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
  p { font-size: 20px; line-height: 1.75; }
  ul { padding-left: 1.2rem; }
  ul li { font-size: 20px; margin-bottom: 4px; }
  
  /* Highlight keyword */
  .kw { background: #fff8e1; color: #7a5200; padding: 1px 5px; border-radius: 3px; font-weight: 600; font-size: 0.88em; }

  .hero { margin-top: 8rem;padding:8px 18px 30px;}
